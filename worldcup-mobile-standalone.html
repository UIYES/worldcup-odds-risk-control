<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界杯赔率风控分析手机版</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --blue: #2563eb;
      --green: #059669;
      --red: #dc2626;
      --orange: #ea580c;
      --soft-blue: #eff6ff;
      --soft-green: #ecfdf5;
      --soft-red: #fef2f2;
      --soft-orange: #fff7ed;
      --shadow: 0 12px 36px rgba(15, 23, 42, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .app {
      width: min(1080px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 48px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 24px; letter-spacing: -.4px; }
    h2 { font-size: 19px; }
    h3 { font-size: 15px; }
    p { color: var(--muted); line-height: 1.55; font-size: 13px; }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      color: var(--muted);
      background: #fff;
      font-size: 12px;
      white-space: nowrap;
    }

    .pill.good { color: var(--green); background: var(--soft-green); border-color: #bbf7d0; }
    .pill.bad { color: var(--red); background: var(--soft-red); border-color: #fecaca; }
    .pill.warn { color: var(--orange); background: var(--soft-orange); border-color: #fed7aa; }
    .pill.blue { color: var(--blue); background: var(--soft-blue); border-color: #bfdbfe; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .section {
      padding: 16px;
      margin-bottom: 12px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .summary {
      padding: 13px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
    }

    .summary span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .summary strong {
      font-size: 22px;
    }

    .board {
      display: grid;
      grid-template-columns: 1.25fr .9fr .9fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .board-card {
      padding: 14px;
      min-height: 128px;
    }

    .board-card h2 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .board-list {
      display: grid;
      gap: 8px;
    }

    .board-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f9fafb;
      cursor: pointer;
    }

    .board-row strong {
      font-size: 13px;
    }

    .board-row span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-top: 2px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    select, button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      cursor: pointer;
    }

    button.primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    button.ghost {
      background: #fff;
    }

    .matches {
      display: grid;
      gap: 10px;
    }

    .match {
      padding: 12px 14px;
      cursor: pointer;
    }

    .match-line {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .match-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .decision-strip {
      display: grid;
      grid-template-columns: 1.2fr repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .decision-item {
      padding: 10px;
      border-radius: 12px;
      background: #f9fafb;
      border: 1px solid var(--line);
    }

    .decision-item span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
    }

    .decision-item strong {
      font-size: 14px;
    }

    .title-score {
      display: inline-flex;
      align-items: center;
      margin-left: 8px;
      padding: 4px 9px;
      border-radius: 10px;
      background: var(--soft-blue);
      color: var(--blue);
      font-size: 16px;
      vertical-align: middle;
    }

    .ticket-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .ticket {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #f9fafb;
    }

    .ticket.recommended {
      border-color: #bfdbfe;
      background: var(--soft-blue);
    }

    .ticket h3 {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .ticket-line {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(229,231,235,.8);
      font-size: 13px;
    }

    .ticket-line:last-child {
      border-bottom: 0;
    }

    .ticket-line span {
      color: var(--muted);
    }

    .match-head, .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .teams {
      font-size: 17px;
      font-weight: 800;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .mini {
      padding: 10px;
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    .mini span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
    }

    .mini strong {
      font-size: 14px;
    }

    .final-card {
      padding: 16px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: #fff;
      border: 0;
    }

    .final-card p {
      color: rgba(255,255,255,.72);
    }

    .final-grid {
      display: grid;
      grid-template-columns: 1.2fr repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .final-item {
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.12);
    }

    .final-item span {
      color: rgba(255,255,255,.65);
      font-size: 12px;
    }

    .final-item strong {
      display: block;
      font-size: 20px;
      margin-top: 6px;
    }

    .score-ring {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--blue) calc(var(--score) * 1%), #e5e7eb 0);
      margin: 12px auto 8px;
    }

    .score-ring b {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: #fff;
      display: grid;
      place-items: center;
      font-size: 22px;
    }

    .reason-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .reason {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f9fafb;
      font-size: 13px;
    }

    .reason span {
      color: var(--muted);
    }

    .screen.hidden { display: none; }

    .detail-title {
      padding: 16px;
      margin-bottom: 12px;
    }

    .detail-title h2 {
      font-size: 24px;
      margin: 8px 0;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
      position: sticky;
      top: 0;
      padding: 8px 0;
      background: rgba(246,247,251,.92);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .tabs button.active {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .prob-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .prob {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #f9fafb;
    }

    .prob span {
      color: var(--muted);
      font-size: 12px;
    }

    .prob strong {
      display: block;
      font-size: 24px;
      margin-top: 4px;
    }

    .bar {
      height: 7px;
      background: #e5e7eb;
      border-radius: 99px;
      overflow: hidden;
      margin-top: 9px;
    }

    .bar i {
      display: block;
      height: 100%;
      background: var(--blue);
      border-radius: 99px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 10px;
    }

    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      font-weight: 600;
      font-size: 12px;
    }

    .chart {
      width: 100%;
      height: 260px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      margin-top: 12px;
    }

    .score-selector {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      margin-top: 12px;
    }

    .score-selector button {
      white-space: nowrap;
      padding: 8px 10px;
    }

    .score-selector button.active {
      color: #fff;
      background: var(--blue);
      border-color: var(--blue);
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .score-cell {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f9fafb;
    }

    .score-cell strong {
      display: block;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .score-cell span {
      color: var(--muted);
      font-size: 12px;
    }

    .heatmap-wrap {
      overflow-x: auto;
      margin-top: 12px;
      padding-bottom: 4px;
    }

    .heatmap {
      min-width: 720px;
      display: grid;
      grid-template-columns: 64px repeat(6, 1fr);
      gap: 6px;
    }

    .heat-cell {
      min-height: 58px;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 8px;
      background: #f9fafb;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .heat-cell.header {
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      align-items: center;
      text-align: center;
      min-height: 38px;
    }

    .heat-cell.score {
      cursor: pointer;
    }

    .heat-cell.score.active {
      outline: 2px solid var(--blue);
      outline-offset: 1px;
    }

    .heat-cell strong {
      font-size: 14px;
    }

    .heat-cell span {
      color: #374151;
      font-size: 11px;
      margin-top: 4px;
    }

    .market-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .market-card {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #f9fafb;
    }

    .market-card span {
      color: var(--muted);
      font-size: 12px;
    }

    .market-card strong {
      display: block;
      font-size: 20px;
      margin-top: 6px;
    }

    .note {
      padding: 12px;
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: 14px;
      margin-top: 12px;
    }

    .note b { color: var(--text); }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .tournament-bar { padding: 14px 16px; }

    .tournament-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
    }

    .tournament-row h2 { font-size: 18px; }

    .tournament-picker {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 180px;
    }

    .tournament-picker label {
      color: var(--muted);
      font-size: 11px;
    }

    .tournament-picker select {
      padding: 9px 10px;
      font-size: 13px;
    }

    .backtest-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .backtest-card {
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #f9fafb;
    }

    .backtest-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .backtest-card strong {
      display: block;
      font-size: 22px;
    }

    .backtest-card p {
      margin-top: 5px;
      font-size: 12px;
    }

    .case-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .case-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
    }

    .case-row strong {
      font-size: 13px;
    }

    @media (max-width: 760px) {
      .app { width: min(100% - 20px, 1080px); padding-top: 12px; }
      .topbar { align-items: flex-start; }
      h1 { font-size: 21px; }
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .board { grid-template-columns: 1fr; }
      .summary strong { font-size: 20px; }
      .toolbar { display: grid; grid-template-columns: 1fr; }
      .tournament-row { grid-template-columns: 1fr; }
      .tournament-picker { min-width: 0; }
      .backtest-grid { grid-template-columns: repeat(2, 1fr); }
      .mini-grid { grid-template-columns: repeat(2, 1fr); }
      .final-grid { grid-template-columns: 1fr 1fr; }
      .decision-strip { grid-template-columns: 1fr 1fr; }
      .ticket-grid { grid-template-columns: 1fr; }
      .tabs { grid-template-columns: repeat(5, minmax(70px, 1fr)); overflow-x: auto; }
      .tabs button { padding: 9px 8px; font-size: 12px; white-space: nowrap; }
      .prob-grid, .two-col { grid-template-columns: 1fr; }
      .score-grid { grid-template-columns: repeat(2, 1fr); }
      .market-grid { grid-template-columns: repeat(2, 1fr); }
      .match-head { align-items: flex-start; }
      .chart { height: 230px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="overviewScreen" class="screen">
      <div class="topbar">
        <div>
          <h1>赛事总览</h1>
          <p>先选届别，再看比赛列表，点进每场比赛看赔率、波胆和让球水位。</p>
        </div>
        <span class="pill blue" id="topbarPill">回测原型</span>
      </div>

      <div id="tournamentBar"></div>
      <div id="crossTournamentDashboard"></div>
      <div id="dataHealth"></div>

      <div class="summary-grid" id="summaryGrid"></div>

      <div class="board" id="priorityBoard"></div>

      <div id="backtestDashboard"></div>

      <div class="toolbar">
        <select id="stageFilter">
          <option value="全部">全部阶段</option>
          <option value="小组赛">小组赛</option>
          <option value="淘汰赛">淘汰赛</option>
          <option value="决赛">决赛</option>
        </select>
      </div>

      <div class="topbar">
        <div>
          <h2>全部比赛</h2>
          <p>列表保持紧凑，详细分析点进去看。</p>
        </div>
        <span class="pill" id="matchTotal"></span>
      </div>
      <div class="matches" id="matches"></div>
    </section>

    <section id="detailScreen" class="screen hidden">
      <div class="topbar">
        <button class="ghost" onclick="goBack()">← 返回赛事总览</button>
        <span class="pill warn">模拟采集数据</span>
      </div>
      <div id="detailTitle"></div>
      <div class="tabs">
        <button id="tabOverview" onclick="setTab('overview')">概览</button>
        <button id="tabRiskScore" onclick="setTab('riskScore')">评分</button>
        <button id="tabScoreOdds" onclick="setTab('scoreOdds')">波胆</button>
        <button id="tabHandicap" onclick="setTab('handicap')">让球</button>
        <button id="tabCollect" onclick="setTab('collect')">采集</button>
      </div>
      <div id="detailContent"></div>
    </section>
  </main>

  <script>
/* 内嵌文件：data/tournaments.js */
// 赛事注册表（届别选择的数据源）
// 后期增加新届/新联赛只需要：
//   1. 新建一个数据文件（如 data/matches-euro2024.js），导出 window.MATCHES_EURO2024
//   2. 在 index.html 加一行 <script src="..."> 引用
//   3. 在下面的 TOURNAMENTS 数组里追加一项
// 评分引擎、UI、配置都不需要改，保证后期可维护性。
//
// 字段说明：
//   id         唯一标识，用于 localStorage 记忆用户选择
//   name       完整名字（详情页用）
//   short      列表/下拉框展示的短名
//   year       年份（用于排序）
//   type       赛事类型：worldcup / euro / club / league
//   status     已结束 / 进行中 / 未开始
//   dataKey    实际数据挂载到 window 的变量名
//   description 选择该赛事时的引导说明
window.TOURNAMENTS = [
  {
    id: "wc2026",
    name: "2026 美加墨世界杯",
    short: "2026 世界杯",
    year: 2026,
    type: "worldcup",
    status: "未开始",
    dataKey: "MATCHES_2026",
    description: "项目最终目标。等抽签和盘口数据就绪后，切到这里就能用同一套分析流程。"
  },
  {
    id: "wc2022",
    name: "2022 卡塔尔世界杯",
    short: "2022 世界杯",
    year: 2022,
    type: "worldcup",
    status: "已结束",
    dataKey: "MATCHES_2022",
    description: "用于回测的历史数据。先在这里把分析方法跑通，命中和失手都能看见。"
  },
  {
    id: "wc2018",
    name: "2018 俄罗斯世界杯",
    short: "2018 世界杯",
    year: 2018,
    type: "worldcup",
    status: "已结束",
    dataKey: "MATCHES_2018",
    description: "再加一届世界杯做交叉验证，看看同一套分析方法在不同年份是不是都说得通。"
  }
];

// 默认选中的赛事（首次访问时用）
window.DEFAULT_TOURNAMENT_ID = "wc2022";

  </script>
  <script>
/* 内嵌文件：data/matches-2018.js */
// 2018 俄罗斯世界杯历史回测样本数据（模拟数据）
// 字段结构与 matches-2022.js 完全一致，保证评分引擎不需要改。
window.MATCHES_2018 = [
  {
    id: 101,
    date: "2018-06-27",
    stage: "小组赛",
    home: "韩国",
    away: "德国",
    actual: "2:0",
    finalScore: "2:0",
    predict: "德国胜",
    confidence: 70,
    resultCorrect: false,
    probs: { home: 12, draw: 22, away: 66 },
    goals: [["0-1球", 20], ["2-3球", 55], ["4球以上", 25]],
    scoreOdds: {
      "0:1": [6.6, 6.4, 6.2, 6.0, 5.9],
      "0:2": [6.8, 6.6, 6.3, 6.1, 5.9],
      "1:2": [7.4, 7.2, 6.9, 6.7, 6.5],
      "1:1": [9.0, 8.8, 8.6, 8.4, 8.2],
      "2:0": [22, 21, 19, 17, 14]
    },
    scoreProb: [["0:2", 16], ["0:1", 14], ["1:2", 12], ["1:1", 10], ["2:0", 4]],
    handicap: {
      line: "德国 -1.5",
      timeline: [
        { time: "初盘",  line: "德国 -1.25", homeWater: 0.94, awayWater: 0.94 },

  <script>
/* 内嵌文件：engine/scoring.js */
// 世界杯风控评分引擎
// 目标：把操盘风控、盘口合理性、多家公司一致性、波胆热区、临场确认等计算逻辑从页面中拆出来。
(function () {
  const CONFIG = window.SCORING_CONFIG || {
    scoreRange: { maxCorrectScore: 5 },
    riskThresholds: { focus: 72, wait: 55 },
    weights: {
      handicapChange: 22,
      waterDirection: 18,
      bookmakerConsensus: 18,
      marketHeat: 14,
      upsetControl: 14,
      scoreOddsFit: 9,
      goalsFit: 5
    },
    labels: {
      focus: "可重点跟踪",
      wait: "等临场确认",
      filter: "建议过滤",
      lowRisk: "风险可控",
      midRisk: "谨慎观察",
      highRisk: "高风险"
    }
  };

  function bestGoal(match) {
    return [...match.goals].sort((a, b) => b[1] - a[1])[0];
  }

  function last(arr) {
    return arr[arr.length - 1];
  }

  function fullScoreMarket(m) {
    const result = [];
    const maxScore = CONFIG.scoreRange.maxCorrectScore;
    for (let h = 0; h <= maxScore; h++) {
      for (let a = 0; a <= maxScore; a++) {
        const score = `${h}:${a}`;
        const base = m.scoreOdds[score] || estimateScoreOdds(m, h, a);
        const first = base[0];
        const lastValue = base[base.length - 1];
        result.push({
          score,
          home: h,
          away: a,
          values: base,
          last: lastValue,
          change: ((lastValue - first) / first) * 100,
          type: h > a ? "主胜" : h === a ? "平局" : "客胜"
        });
      }
    }

    [
      { score: "其他主胜", values: [31, 29, 27, 25, 23], type: "主胜" },
      { score: "其他平局", values: [41, 39, 37, 35, 33], type: "平局" },
      { score: "其他客胜", values: [36, 34, 31, 29, 26], type: "客胜" }
    ].forEach(x => result.push({
      ...x,
      home: maxScore + 1,
      away: maxScore + 1,
      last: x.values[x.values.length - 1],
      change: ((x.values[x.values.length - 1] - x.values[0]) / x.values[0]) * 100
    }));
    return result;
  }

  function handicapTimeline(m) {
    if (m.handicap.timeline?.length) return m.handicap.timeline;
    return m.handicap.homeWater.map((homeWater, index) => ({
      time: ["初盘", "T-24h", "T-6h", "T-1h", "临场"][index] || `T${index}`,
      line: m.handicap.line,
      homeWater,
      awayWater: m.handicap.awayWater[index]
    }));
  }

  function parseHandicapValue(line) {
    const match = line.match(/(-?\d+(?:\.\d+)?)/);
    return match ? Number(match[1]) : 0;
  }

  function lineMovementSummary(m) {
    const timeline = handicapTimeline(m);
    const first = timeline[0];
    const lastItem = timeline[timeline.length - 1];
    const firstValue = parseHandicapValue(first.line);
    const lastValue = parseHandicapValue(lastItem.line);
    const movementValue = Number((lastValue - firstValue).toFixed(2));
    let movement = "盘口平稳";
    let meaning = "盘口没有明显升降，重点看水位和波胆是否配合。";
    if (movementValue < 0) {
      movement = "盘口升深";
      meaning = "让球门槛变高，通常代表强势方阻力变大，也可能是真支持。";
    } else if (movementValue > 0) {
      movement = "盘口退浅";
      meaning = "让球门槛变低，通常代表强势方信心下降或市场出现反向压力。";
    }
    return {
      opening: first.line,
      closing: lastItem.line,
      movement,
      movementValue,
      meaning
    };
  }

  function estimateScoreOdds(m, h, a) {
    const total = h + a;
    const diff = h - a;
    const favHome = m.probs.home >= m.probs.away;
    let start = 7 + total * 2.7 + Math.abs(diff) * 1.5;
    if ((favHome && diff > 0) || (!favHome && diff < 0)) start -= 1.8;
    if ((favHome && diff < 0) || (!favHome && diff > 0)) start += 5.5;
    if (total >= 5) start += 7;
    if (h === a) start += total <= 2 ? -0.8 : 4;
    start = Math.max(5.2, Number(start.toFixed(1)));
    const focus = m.scoreProb.find(x => x[0] === `${h}:${a}`);
    const drop = focus ? .18 : ((diff < 0 && m.confidence > 60) ? .10 : .06);
    return [0, 1, 2, 3, 4].map(i => Number((start * (1 - drop * i / 4)).toFixed(1)));
  }

  function handicapProfile(m) {
    const timeline = handicapTimeline(m);
    const h = timeline.map(x => x.homeWater);
    const a = timeline.map(x => x.awayWater);
    const hMove = last(h) - h[0];
    const aMove = last(a) - a[0];
    const heat = Math.min(95, Math.round(52 + Math.abs(hMove - aMove) * 180 + (m.confidence - 50) * .7));
    const upset = Math.max(5, Math.min(90, Math.round((m.confidence > 65 ? 36 : 24) + (hMove > 0 ? 28 : 0) + (aMove < 0 ? 25 : 0) + (m.resultCorrect ? -8 : 18))));
    const signal = hMove < 0 && aMove > 0 ? "上盘受热" : hMove > 0 && aMove < 0 ? "下盘升温" : "分歧不大";
    const depth = last(timeline).line.includes("-1.5") ? "盘口较深" : last(timeline).line.includes("-1") ? "中深盘口" : "浅盘或平手";
    const waterDirection = signal === "上盘受热" ? "水位支持强队方向" : signal === "下盘升温" ? "水位对热门不友好" : "水位暂时平稳";
    const heatRisk = heat > 75 ? "热度偏高，要防热门过热" : heat > 60 ? "热度中等，需要继续观察" : "热度不算极端";
    const upsetText = upset > 60 ? "爆冷信号明显" : upset > 40 ? "有一定爆冷空间" : "爆冷信号较弱";
    return { heat, upset, signal, depth, waterDirection, heatRisk, upsetText };
  }

  function handicapRationality(m) {
    const profile = handicapProfile(m);
    const market = fullScoreMarket(m);
    const hotScores = [...market].sort((a, b) => a.change - b.change).slice(0, 6);
    const favHome = m.probs.home >= m.probs.away;
    const favType = favHome ? "主胜" : "客胜";
    const favHot = hotScores.filter(x => x.type === favType).length;
    const drawHot = hotScores.filter(x => x.type === "平局").length;
    const coldHot = hotScores.filter(x => x.type !== favType && x.type !== "平局").length;
    let score = 55;

    if (profile.signal === "上盘受热" && favHot >= 2) score += 18;
    if (profile.signal === "下盘升温") score -= 16;
    if (profile.heat > 78) score -= 8;
    if (profile.upset > 60) score -= 15;
    if (drawHot >= 2) score -= 6;
    if (coldHot >= 2) score -= 10;
    if (profile.depth === "盘口较深" && m.confidence >= 65) score += 8;
    if (profile.depth === "浅盘或平手" && Math.abs(m.probs.home - m.probs.away) <= 8) score += 8;

    score = Math.max(10, Math.min(95, Math.round(score)));
    const level = score >= 75 ? "盘口较合理" : score >= 55 ? "需要观察" : "风险偏高";
    const reasons = [
      ["水位方向", profile.waterDirection],
      ["热度判断", profile.heatRisk],
      ["爆冷判断", profile.upsetText],
      ["波胆核对", favHot >= 2 ? "热门方向波胆有配合" : coldHot >= 2 ? "冷门波胆有异动" : "波胆分布较分散"]
    ];
    return { score, level, reasons };
  }

  function scoreHeatSummary(m) {
    const market = fullScoreMarket(m);
    const hot = [...market].sort((a, b) => a.change - b.change).slice(0, 10);
    const byType = {
      主胜: hot.filter(x => x.type === "主胜"),
      平局: hot.filter(x => x.type === "平局"),
      客胜: hot.filter(x => x.type === "客胜")
    };
    const lowGoal = hot.filter(x => x.home + x.away <= 2);
    const midGoal = hot.filter(x => x.home + x.away >= 3 && x.home + x.away <= 4);
    const highGoal = hot.filter(x => x.home + x.away >= 5);
    const topType = Object.entries(byType).sort((a, b) => b[1].length - a[1].length)[0][0];
    const goalBias = highGoal.length >= 3 ? "大球热度更高" : lowGoal.length >= 3 ? "小球热度更高" : midGoal.length >= 3 ? "中等进球热度更高" : "进球数信号分散";
    const upsetHint = byType.客胜.length >= 3 || (m.probs.home > m.probs.away && byType.客胜.length >= 2)
      ? "冷门比分有热度，需要防爆冷"
      : byType.平局.length >= 3
        ? "平局比分有热度，需要防平"
        : "冷门信号暂时不强";
    const plainText = `当前波胆热区更偏${topType}，${goalBias}，${upsetHint}。`;
    const groups = [
      ["主胜热区", byType.主胜.slice(0, 3).map(x => `${x.score}(${x.change.toFixed(1)}%)`).join(" / ") || "不明显"],
      ["平局热区", byType.平局.slice(0, 3).map(x => `${x.score}(${x.change.toFixed(1)}%)`).join(" / ") || "不明显"],
      ["客胜热区", byType.客胜.slice(0, 3).map(x => `${x.score}(${x.change.toFixed(1)}%)`).join(" / ") || "不明显"],
      ["进球倾向", goalBias]
    ];
    return {
      topType,
      goalBias,
      upsetHint,
      plainText,
      groups,
      hotScores: hot.slice(0, 6)
    };
  }

  function handicapPlainExplanation(m) {
    const profile = handicapProfile(m);
    const lineMove = lineMovementSummary(m);
    const timeline = handicapTimeline(m);
    const first = timeline[0];
    const lastItem = timeline[timeline.length - 1];
    const homeWaterMove = Number((lastItem.homeWater - first.homeWater).toFixed(2));
    const awayWaterMove = Number((lastItem.awayWater - first.awayWater).toFixed(2));
    let waterText = "上下盘水位变化不大，市场态度暂时不算极端。";
    if (homeWaterMove < -0.05 && awayWaterMove > 0.05) {
      waterText = "上盘水位下降、下盘水位上升，说明市场更愿意接受强势方方向，但也要防热门过热。";
    } else if (homeWaterMove > 0.05 && awayWaterMove < -0.05) {
      waterText = "上盘水位上升、下盘水位下降，说明强势方开始变得不舒服，弱势方或冷门方向在升温。";
    }

    let lineText = "盘口没有明显变化，说明机构暂时没有明显提高或降低门槛。";
    if (lineMove.movement === "盘口升深") {
      lineText = "盘口升深，意思是强势方需要赢更多才算打出，这可能是真支持，也可能是机构提高门槛来控制热门风险。";
    } else if (lineMove.movement === "盘口退浅") {
      lineText = "盘口退浅，意思是强势方门槛降低，通常代表机构对强势方信心下降，或者市场有反向资金进入。";
    }

    const riskText = profile.upset > 60
      ? "爆冷潜力偏高，这场不适合只看热门方向。"
      : profile.upset > 40
        ? "有一定爆冷空间，需要保留防守方案。"
        : "爆冷信号暂时不明显，可以更多关注主方向是否继续被盘口支持。";

    return {
      headline: `${lineMove.movement}，${profile.signal}`,
      items: [
        ["盘口表达", lineText],
        ["水位表达", waterText],
        ["市场热度", profile.heatRisk],
        ["冷门提醒", riskText]
      ],
      conclusion: `${lineText}${waterText}${riskText}`
    };
  }

  function finalPrediction(m) {
    const profile = handicapProfile(m);
    const rational = handicapRationality(m);
    const market = fullScoreMarket(m);
    const hotScores = [...market].sort((a, b) => a.change - b.change).slice(0, 4).map(x => x.score);
    const goal = bestGoal(m)[0];
    const favorite = m.probs.home > m.probs.away ? m.home : m.away;
    const drawRisk = m.probs.draw >= 30 || hotScores.some(s => s.includes(":") && s.split(":")[0] === s.split(":")[1]);
    let direction = `${favorite}方向`;
    if (profile.upset > 62) direction = "防冷门";
    else if (drawRisk) direction = `${favorite}不败，防平`;

    let confidence = Math.round((m.confidence * .45) + (rational.score * .35) + ((100 - profile.upset) * .20));
    confidence = Math.max(20, Math.min(92, confidence));
    return {
      direction,
      scoreZone: hotScores.slice(0, 3).join(" / "),
      goalZone: goal,
      confidence
    };
  }

  function bettingReferencePlan(m) {
    const risk = riskControlScore(m);
    const profile = handicapProfile(m);
    const final = finalPrediction(m);
    const hotMarket = [...fullScoreMarket(m)].sort((a, b) => a.change - b.change);
    const mainScores = hotMarket.slice(0, 3).map(x => x.score).join(" / ");
    const drawScores = hotMarket.filter(x => x.type === "平局").slice(0, 2).map(x => x.score).join(" / ") || "1:1 / 0:0";
    const coldScores = hotMarket.filter(x => x.type !== (m.probs.home >= m.probs.away ? "主胜" : "客胜") && x.type !== "平局").slice(0, 2).map(x => x.score).join(" / ") || "0:1 / 1:2";
    const favTeam = m.probs.home >= m.probs.away ? m.home : m.away;
    const underdog = m.probs.home >= m.probs.away ? m.away : m.home;
    const goal = bestGoal(m)[0];
    const result = profile.upset > 62 ? `${underdog}不败方向` : final.direction.includes("防平") ? `${favTeam}不败` : `${favTeam}方向`;
    const coverResult = profile.upset > 62 ? `${favTeam}方向少量防守` : "平局或冷门防守";
    return {
      main: {
        grade: risk.action,
        result,
        scores: mainScores,
        goals: goal,
        handicap: profile.signal
      },
      cover: {
        grade: profile.upset > 60 ? "必须防" : "可选防",
        result: coverResult,
        scores: profile.upset > 60 ? coldScores : drawScores,
        goals: goal.includes("0-1") ? "小球优先" : goal,
        usage: "用于防临场反向变化"
      }
    };
  }

  function liveConfirmation(m) {
    const profile = handicapProfile(m);
    return [
      { name: "让球盘口", condition: "盘口升盘且上盘不升水", action: "主方向可信度提高" },
      { name: "水位反向", condition: "热门方向临场升水，下盘降水", action: "降低主方向，转为防冷或过滤" },
      { name: "多家公司", condition: "3家以上公司同方向变盘", action: "信号加强；如果分歧大则继续等待" },
      { name: "波胆热区", condition: "主方向比分集体降赔", action: "候选比分可信度提高" },
      { name: "首发消息", condition: "核心球员缺阵或轮换", action: "重新计算胜平负和进球数" },
      {
        name: "当前状态",
        condition: profile.upset > 60 ? "爆冷潜力偏高" : "爆冷信号未明显放大",
        action: profile.upset > 60 ? "必须保留防守方案" : "按主方案观察临场"
      }
    ];
  }

  function bookmakerConsensus(m) {
    const profile = handicapProfile(m);
    const h = m.handicap.homeWater;
    const a = m.handicap.awayWater;
    const baseHome = last(h);
    const baseAway = last(a);
    const baseLine = last(handicapTimeline(m)).line;
    const variants = [
      { name: "A公司", lineShift: 0, homeAdjust: 0.00, awayAdjust: 0.00 },
      { name: "B公司", lineShift: profile.signal === "上盘受热" ? 0 : -0.25, homeAdjust: 0.03, awayAdjust: -0.02 },
      { name: "C公司", lineShift: profile.signal === "下盘升温" ? -0.25 : 0, homeAdjust: -0.02, awayAdjust: 0.03 },
      { name: "D公司", lineShift: 0, homeAdjust: 0.01, awayAdjust: -0.01 },
      { name: "E公司", lineShift: profile.upset > 60 ? -0.25 : 0, homeAdjust: profile.upset > 60 ? 0.05 : -0.01, awayAdjust: profile.upset > 60 ? -0.04 : 0.02 }
    ];
    const books = variants.map(v => {
      const homeWater = Number((baseHome + v.homeAdjust).toFixed(2));
      const awayWater = Number((baseAway + v.awayAdjust).toFixed(2));
      const signal = homeWater < awayWater ? "偏上盘" : homeWater > awayWater ? "偏下盘" : "均衡";
      return {
        name: v.name,
        line: shiftLine(baseLine, v.lineShift),
        homeWater,
        awayWater,
        signal
      };
    });
    const mainSignal = books[0].signal;
    const same = books.filter(b => b.signal === mainSignal).length;
    const consistency = Math.round(same / books.length * 100);
    const comment = consistency >= 80
      ? "多家公司方向接近，盘口信号可信度较高，但仍要看是否热门过热。"
      : consistency >= 60
        ? "多数公司方向一致，但仍有分歧，适合继续跟踪临场变化。"
        : "公司之间分歧明显，不适合过早下结论，风控上应降低信心。";
    return { books, consistency, comment };
  }

  function shiftLine(line, shift) {
    if (!shift) return line;
    const match = line.match(/(.+?)\s(-?\d+(?:\.\d+)?)/);
    if (!match) return line;
    const team = match[1];
    const value = Number(match[2]) + shift;
    return `${team} ${value > 0 ? "+" : ""}${value}`;
  }

  function riskControlScore(m) {
    const profile = handicapProfile(m);
    const rational = handicapRationality(m);
    const consensus = bookmakerConsensus(m);
    const market = fullScoreMarket(m);
    const hot = [...market].sort((a, b) => a.change - b.change).slice(0, 8);
    const favType = m.probs.home >= m.probs.away ? "主胜" : "客胜";
    const favHot = hot.filter(x => x.type === favType).length;
    const coldHot = hot.filter(x => x.type !== favType && x.type !== "平局").length;
    const drawHot = hot.filter(x => x.type === "平局").length;
    const goalTop = bestGoal(m)[0];

    const handicapChangeScore = rational.score;
    const waterScore = profile.signal === "上盘受热" ? 72 : profile.signal === "下盘升温" ? 46 : 60;
    const heatScore = profile.heat > 80 ? 42 : profile.heat > 65 ? 58 : 72;
    const upsetScore = 100 - profile.upset;
    const scoreOddsScore = favHot >= 3 ? 75 : coldHot >= 2 ? 42 : drawHot >= 2 ? 55 : 62;
    const goalScore = goalTop.includes("2-3") ? 66 : goalTop.includes("0-1") ? 58 : 52;
    const consensusScore = consensus.consistency;

    const weights = CONFIG.weights;
    const parts = [
      { name: "让球盘口变化", weight: weights.handicapChange, score: handicapChangeScore, note: rational.level },
      { name: "上下盘水位", weight: weights.waterDirection, score: waterScore, note: profile.waterDirection },
      { name: "多家公司一致性", weight: weights.bookmakerConsensus, score: consensusScore, note: consensus.comment },
      { name: "市场热度控制", weight: weights.marketHeat, score: heatScore, note: profile.heatRisk },
      { name: "爆冷风险控制", weight: weights.upsetControl, score: upsetScore, note: profile.upsetText },
      { name: "波胆热区配合", weight: weights.scoreOddsFit, score: scoreOddsScore, note: favHot >= 3 ? "波胆支持主方向" : coldHot >= 2 ? "冷门波胆偏热" : "波胆信号一般" },
      { name: "进球数配合", weight: weights.goalsFit, score: goalScore, note: `当前倾向 ${goalTop}` }
    ];

    const total = Math.round(parts.reduce((sum, p) => sum + p.score * p.weight / 100, 0));
    const riskLevel = total >= CONFIG.riskThresholds.focus ? CONFIG.labels.lowRisk : total >= CONFIG.riskThresholds.wait ? CONFIG.labels.midRisk : CONFIG.labels.highRisk;
    const action = total >= CONFIG.riskThresholds.focus ? CONFIG.labels.focus : total >= CONFIG.riskThresholds.wait ? CONFIG.labels.wait : CONFIG.labels.filter;
    const reverseRisks = [
      ["热门过热", profile.heat > 75 ? "偏高" : "可接受", "热度高但盘口不配合时，容易出问题"],
      ["冷门波胆", coldHot >= 2 ? "有异动" : "不明显", "冷门比分持续降赔，要降低主方向信心"],
      ["平局风险", drawHot >= 2 ? "偏高" : "一般", "淘汰赛或强强对话，平局权重要提高"],
      ["公司分歧", consensus.consistency < 60 ? "明显" : "不明显", "多家公司不一致时，不宜过早判断"]
    ];
    return { total, riskLevel, action, parts, reverseRisks };
  }

  const api = {
    bestGoal,
    fullScoreMarket,
    estimateScoreOdds,
    handicapTimeline,
    lineMovementSummary,
    scoreHeatSummary,
    handicapPlainExplanation,
    handicapProfile,
    handicapRationality,
    finalPrediction,
    bettingReferencePlan,
    liveConfirmation,
    bookmakerConsensus,
    riskControlScore
  };

  window.ScoringEngine = api;
  Object.assign(window, api);
})();

  </script>
  <script>
/* 内嵌文件：engine/backtest.js */
// 回测统计引擎
// 目标：把命中率、比分区间、进球区间、冷门预警等计算从页面中拆出来。
// 后期接入 2026 世界杯真实数据时，页面只负责展示，回测引擎负责计算。
(function () {
  function actualOutcome(m) {
    if (!m.actual) return "未结束";
    const [home, away] = m.actual.split(":").map(Number);
    if (home > away) return "主胜";
    if (home < away) return "客胜";
    return "平局";
  }

  function favoriteOutcome(m) {
    if (m.probs.home === m.probs.away) return "平局";
    return m.probs.home > m.probs.away ? "主胜" : "客胜";
  }

  function scoreZoneHit(m, final) {
    if (!m.actual) return false;
    return final.scoreZone.split(" / ").includes(m.actual);
  }

  function goalZoneHit(m, final) {
    if (!m.actual) return false;
    const [home, away] = m.actual.split(":").map(Number);
    const total = home + away;
    if (final.goalZone.includes("0-1")) return total <= 1;
    if (final.goalZone.includes("2-3")) return total >= 2 && total <= 3;
    if (final.goalZone.includes("4")) return total >= 4;
    return false;
  }

  function upsetHappened(m) {
    if (!m.actual) return false;
    const fav = favoriteOutcome(m);
    const actual = actualOutcome(m);
    return fav !== "平局" && actual !== fav;
  }

  function pct(part, total) {
    return total ? Math.round(part / total * 100) + "%" : "暂无";
  }

  function backtestRows(list) {
    return list
      .filter(m => m.actual)
      .map(m => {
        const risk = riskControlScore(m);
        const profile = handicapProfile(m);
        const final = finalPrediction(m);
        return {
          match: m,
          risk,
          profile,
          final,
          directionHit: Boolean(m.resultCorrect),
          scoreHit: scoreZoneHit(m, final),
          goalHit: goalZoneHit(m, final),
          upset: upsetHappened(m),
          warnedUpset: profile.upset > 60
        };
      });
  }

  function backtestStats(list) {
    const rows = backtestRows(list);
    const focusRows = rows.filter(x => x.risk.total >= 72);
    const waitRows = rows.filter(x => x.risk.total >= 55 && x.risk.total < 72);
    const filterRows = rows.filter(x => x.risk.total < 55);
    const warned = rows.filter(x => x.warnedUpset);
    const missRows = rows.filter(x => !x.directionHit || (x.warnedUpset && !x.upset));
    return {
      rows,
      total: rows.length,
      directionRate: pct(rows.filter(x => x.directionHit).length, rows.length),
      scoreRate: pct(rows.filter(x => x.scoreHit).length, rows.length),
      goalRate: pct(rows.filter(x => x.goalHit).length, rows.length),
      focusRate: pct(focusRows.filter(x => x.directionHit).length, focusRows.length),
      waitRate: pct(waitRows.filter(x => x.directionHit).length, waitRows.length),
      filterRate: pct(filterRows.filter(x => x.directionHit).length, filterRows.length),
      upsetWarnRate: pct(warned.filter(x => x.upset).length, warned.length),
      missRows
    };
  }

  const api = {
    actualOutcome,
    favoriteOutcome,
    scoreZoneHit,
    goalZoneHit,
    upsetHappened,
    backtestRows,
    backtestStats
  };

  window.BacktestEngine = api;
  Object.assign(window, api);
})();

  <script>
/* 内嵌文件：engine/intent.js */
// 盘口意图判断模块
// 目标：把“盘口怎么变”进一步翻译成“机构可能想表达什么”。
// 注意：这里是风控判断，不是保证结果。后期接真实多家公司数据后，需要用回测继续修正规则。
(function () {
  function last(arr) {
    return arr[arr.length - 1];
  }

  function getLineIntent(m) {
    const profile = handicapProfile(m);
    const lineMove = lineMovementSummary(m);
    const timeline = handicapTimeline(m);
    const first = timeline[0];
    const latest = last(timeline);
    const homeWaterMove = Number((latest.homeWater - first.homeWater).toFixed(2));
    const awayWaterMove = Number((latest.awayWater - first.awayWater).toFixed(2));
    const consensus = bookmakerConsensus(m);
    const heat = scoreHeatSummary(m);
    const rational = handicapRationality(m);
    const favoriteSide = m.probs.home >= m.probs.away ? "主队方向" : "客队方向";
    const evidence = [];
    let type = "暂不明确";
    let confidence = 52;
    let plain = "目前盘口、水位、波胆之间没有形成足够清晰的一致信号，适合继续观察。";
    let action = "不要提前下重结论，等临场盘口和多家公司方向更清楚。";

    const isHotFavorite = profile.signal === "上盘受热" && profile.heat >= 72;
    const isReverseWater = profile.signal === "下盘升温";
    const isDeepen = lineMove.movement === "盘口升深";
    const isRetreat = lineMove.movement === "盘口退浅";
    const hasHighConsensus = consensus.consistency >= 80;
    const hasLowConsensus = consensus.consistency < 60;
    const hasUpsetRisk = profile.upset >= 60;
    const hasColdHeat = heat.upsetHint.includes("冷门") || heat.upsetHint.includes("防平");
    const isRational = rational.score >= 70;

    evidence.push(`盘口：${lineMove.opening} → ${lineMove.closing}，${lineMove.movement}`);
    evidence.push(`水位：上盘 ${first.homeWater} → ${latest.homeWater}，下盘 ${first.awayWater} → ${latest.awayWater}`);
    evidence.push(`热度：${profile.heat}%；冷门风险：${profile.upset}%`);
    evidence.push(`多家公司一致性：${consensus.consistency}%`);

    if (hasLowConsensus) {
      type = "分歧大";
      confidence = 62;
      plain = "多家公司方向不够一致，说明市场和机构之间还没有形成统一态度。";
      action = "这类比赛不适合提前判断，等临场至少 3 家以上公司同方向再考虑。";
    } else if (isReverseWater || (isRetreat && hasUpsetRisk)) {
      type = "阻上";
      confidence = 70;
      plain = "热门方向开始变得不舒服，机构没有给强势方很顺的条件，弱势方或冷门方向在升温。";
      action = "降低热门方向权重，优先保留平局或冷门防守方案。";
    } else if (isDeepen && isHotFavorite && hasHighConsensus && profile.heat >= 80) {
      type = "控赔";
      confidence = 74;
      plain = "强势方太热，机构通过更深盘口或调水提高门槛，核心目的可能是控制热门方向赔付。";
      action = "不要只看热门，必须检查波胆冷门和平局热区，避免追高。";
    } else if (isDeepen && profile.signal === "上盘受热" && hasHighConsensus && isRational && !hasColdHeat) {
      type = "真支持";
      confidence = 76;
      plain = `盘口、水位、多家公司方向较一致，比较像机构真的认可${favoriteSide}。`;
      action = "可以列入重点跟踪，但仍要等临场确认上盘是否继续稳定。";
    } else if (isHotFavorite && !isRational && (hasColdHeat || hasUpsetRisk)) {
      type = "诱导";
      confidence = 66;
      plain = "表面看热门方向很热，但盘口合理性、冷门风险或波胆热区并不完全配合，可能在吸引大众追热门。";
      action = "这类比赛宁可少碰，若参与也要把防平、防冷放在前面。";
    }

    const riskNote = {
      真支持: "最怕临场突然升水或退盘，一旦发生，真支持要改成等待确认。",
      控赔: "热门方向不是不能看，但价格可能已经不好，追热门容易买在高点。",
      阻上: "强势方未必不能赢，但盘口正在提醒它赢得不舒服。",
      诱导: "这类信号最容易让新手误以为热门很稳，需要用波胆和多家公司反查。",
      分歧大: "分歧大的比赛最大问题不是方向错，而是过早下结论。",
      暂不明确: "信号不清楚时，过滤往往比强行分析更好。"
    }[type];

    return {
      type,
      confidence,
      plain,
      action,
      riskNote,
      evidence: [
        ...evidence,
        `波胆：${heat.plainText}`,
        `盘口合理性：${rational.score}，${rational.level}`
      ],
      factors: [
        ["盘口意图", type],
        ["判断信心", confidence + "%"],
        ["大白话", plain],
        ["处理建议", action],
        ["风险提醒", riskNote]
      ],
      raw: {
        homeWaterMove,
        awayWaterMove,
        lineMove,
        profile,
        consensus,
        heat,
        rational
      }

// 赛后自动复盘模块
// 目标：比赛结束后，不只判断“对/错”，还要解释可能错在哪里。
// 注意：这是第一版规则归因，后期需要用更多历史比赛回测修正。
(function () {
  function actualOutcome(m) {
    if (!m.actual) return "未结束";
    const [home, away] = m.actual.split(":").map(Number);
    if (home > away) return "主胜";
    if (home < away) return "客胜";
    return "平局";
  }

  function favoriteOutcome(m) {
    if (m.probs.home === m.probs.away) return "平局";
    return m.probs.home > m.probs.away ? "主胜" : "客胜";
  }

  function scoreHit(m, final) {
    if (!m.actual) return false;
    return final.scoreZone.split(" / ").includes(m.actual);
  }

  function goalHit(m, final) {
    if (!m.actual) return false;
    const [home, away] = m.actual.split(":").map(Number);
    const total = home + away;
    if (final.goalZone.includes("0-1")) return total <= 1;
    if (final.goalZone.includes("2-3")) return total >= 2 && total <= 3;
    if (final.goalZone.includes("4")) return total >= 4;
    return false;
  }

  function upsetHappened(m) {
    const fav = favoriteOutcome(m);
    const actual = actualOutcome(m);
    return fav !== "平局" && actual !== fav;
  }

  function reason(label, evidence, suggestion, level) {
    return { label, evidence, suggestion, level: level || "中" };
  }

  function reviewMatch(m) {
    const risk = riskControlScore(m);
    const profile = handicapProfile(m);
    const final = finalPrediction(m);
    const intent = getLineIntent(m);
    const heat = scoreHeatSummary(m);
    const lineMove = lineMovementSummary(m);
    const rational = handicapRationality(m);
    const directionHit = Boolean(m.resultCorrect);
    const scoreZoneHit = scoreHit(m, final);
    const goalZoneHit = goalHit(m, final);
    const upset = upsetHappened(m);
    const reasons = [];

    if (!m.actual) {
      return {
        match: m,
        status: "未结束",
        mainReason: "等待赛果",
        conclusion: "比赛还没有结算，暂时不能做赛后复盘。",
        reasons: [],
        rows: []
      };
    }

    if (!directionHit && profile.heat >= 75) {
      reasons.push(reason(
        "热门过热未过滤",
        `市场热度 ${profile.heat}%，实际结果没有按主方向打出。`,
        "下次遇到高热热门时，应降低主方向权重，优先检查盘口是否在控赔或诱导。",
        "高"
      ));
    }

    if (!directionHit && lineMove.movement === "盘口退浅") {
      reasons.push(reason(
        "退盘信号低估",
        `盘口从 ${lineMove.opening} 退到 ${lineMove.closing}，但系统仍给了主方向。`,
        "退盘代表强势方门槛降低，应提高防平、防冷权重。",
        "高"
      ));
    }

    if (!directionHit && profile.signal === "下盘升温") {
      reasons.push(reason(
        "下盘降水未重视",
        "下盘方向升温，说明弱势方或冷门方向有资金和盘口信号支持。",
        "类似比赛应降低热门信心，并检查冷门波胆是否同步降赔。",
        "高"
      ));
    }

    if (!directionHit && (m.probs.draw >= 30 || heat.upsetHint.includes("防平"))) {
      reasons.push(reason(
        "平局风险低估",
        `平局概率 ${m.probs.draw}%，波胆提示：${heat.upsetHint}。`,
        "淘汰赛、浅盘、平局波胆发热时，应把平局放入防守方案。",
        "中"
      ));
    }

    if (!directionHit && heat.upsetHint.includes("冷门")) {
      reasons.push(reason(
        "冷门波胆异动未加权",
        heat.plainText,
        "冷门比分持续变热时，应提高爆冷权重，避免只看强队方向。",
        "中"
      ));
    }

    if (!directionHit && intent.type === "分歧大") {
      reasons.push(reason(
        "多家公司分歧未降权",
        "多家公司盘口方向不够统一，提前判断容易出错。",
        "分歧大时应默认等待临场确认，而不是提前给强结论。",
        "中"
      ));
    }

    if (!goalZoneHit) {
      reasons.push(reason(
        "进球区间判断偏差",
        `系统判断 ${final.goalZone}，实际比分 ${m.actual}。`,
        "需要继续加入大小球盘口、水位和比赛节奏数据。",
        "中"
      ));
    }

    if (!scoreZoneHit) {
      reasons.push(reason(
        "比分区间覆盖不足",
        `候选比分 ${final.scoreZone}，实际比分 ${m.actual}。`,
        "波胆候选不能只看最热比分，应增加相邻比分和冷门比分覆盖。",
        "低"
      ));
    }

    if (!reasons.length) {
      reasons.push(reason(
        "判断基本合理",
        "方向、比分区间或进球区间没有暴露明显问题。",
        "继续观察更多样本，不要因为单场命中就过度提高权重。",
        "低"
      ));
    }

    const main = reasons[0];
    const rows = [
      ["赛前方向", final.direction],
      ["实际结果", `${m.actual}（${actualOutcome(m)}）`],
      ["方向命中", directionHit ? "命中" : "未命中"],
      ["比分区间", scoreZoneHit ? "命中" : "未命中"],
      ["进球区间", goalZoneHit ? "命中" : "未命中"],
      ["盘口意图", `${intent.type}，信心 ${intent.confidence}%`],
      ["主要复盘原因", main.label]
    ];

    return {
      match: m,
      status: directionHit ? "方向命中" : "方向失手",
      directionHit,
      scoreZoneHit,
      goalZoneHit,
      upset,
      mainReason: main.label,
      conclusion: main.suggestion,
      reasons,
      rows,
      risk,
      profile,
      final,
      intent,
      rational
    };
  }

  function reviewTournament(matches) {
    const reviews = matches.filter(m => m.actual).map(reviewMatch);
    const reasonMap = {};
    reviews.forEach(r => {
      const key = r.mainReason;
      if (!reasonMap[key]) reasonMap[key] = { reason: key, count: 0, matches: [] };
      reasonMap[key].count += 1;
      reasonMap[key].matches.push(`${r.match.home} vs ${r.match.away}`);
    });
    const summary = Object.values(reasonMap).sort((a, b) => b.count - a.count);
    return { reviews, summary };
  }

  const api = { reviewMatch, reviewTournament };
  window.ReviewEngine = api;
  Object.assign(window, api);
})();

// 模型版本对比模块
// 目标：在不改动当前正式模型的前提下，模拟“建议版模型”的回测表现。
// 注意：建议版只是验证思路，不直接替换正式模型。
(function () {
  function pct(part, total) {
    return total ? `${Math.round(part / total * 100)}%` : "暂无";
  }

  function scoreSetFromText(text) {
    return new Set(String(text || "").split(" / ").map(x => x.trim()).filter(Boolean));
  }

  function actualGoalZone(m) {
    if (!m.actual) return "";
    const [home, away] = m.actual.split(":").map(Number);
    const total = home + away;
    if (total <= 1) return "0-1球";
    if (total <= 3) return "2-3球";
    return "4球以上";
  }

  function suggestedScoreZone(m, final) {
    const base = scoreSetFromText(final.scoreZone);
    const heat = scoreHeatSummary(m);
    const market = fullScoreMarket(m);
    heat.hotScores.slice(0, 4).forEach(x => base.add(x.score));
    (m.scoreProb || []).slice(0, 4).forEach(x => base.add(x[0]));
    market
      .filter(x => x.change < -12)
      .slice(0, 4)
      .forEach(x => base.add(x.score));
    return [...base].slice(0, 10);
  }

  function suggestedGoalZones(m, final) {
    const zones = new Set([final.goalZone]);
    const heat = scoreHeatSummary(m);
    const best = [...m.goals].sort((a, b) => b[1] - a[1])[0]?.[0];
    if (best) zones.add(best);
    if (heat.goalBias.includes("大球")) zones.add("4球以上");
    if (heat.goalBias.includes("小球")) zones.add("0-1球");
    if (heat.goalBias.includes("中等")) zones.add("2-3球");
    return [...zones];
  }

  function suggestedRiskAction(m, risk, profile, intent) {
    const final = finalPrediction(m);
    const shouldFilter =
      (profile.heat >= 78 && profile.upset >= 55) ||
      profile.signal === "下盘升温" ||
      intent.type === "诱导" ||
      intent.type === "分歧大";
    const shouldWait =
      shouldFilter ||
      intent.type === "控赔" ||
      (m.stage === "淘汰赛" && m.probs.draw >= 28);

    if (shouldFilter && risk.total < 72) return "建议过滤";
    if (shouldWait) return "等临场确认";
    return final.direction;
  }

  function compareModelVersions(matches) {
    const rows = matches.filter(m => m.actual).map(m => {
      const risk = riskControlScore(m);
      const profile = handicapProfile(m);
      const intent = getLineIntent(m);
      const final = finalPrediction(m);
      const currentDirectionHit = Boolean(m.resultCorrect);
      const currentScoreHit = scoreZoneHit(m, final);
      const currentGoalHit = goalZoneHit(m, final);
      const action = suggestedRiskAction(m, risk, profile, intent);
      const suggestedFilteredMiss = !currentDirectionHit && (action === "建议过滤" || action === "等临场确认");
      const suggestedLostChance = currentDirectionHit && action === "建议过滤";
      const scoreZones = suggestedScoreZone(m, final);
      const goalZones = suggestedGoalZones(m, final);
      const suggestedScoreHit = scoreZones.includes(m.actual);
      const suggestedGoalHit = goalZones.includes(actualGoalZone(m));

        match: m,
        currentDirectionHit,
        currentScoreHit,
        currentGoalHit,
        action,
        suggestedFilteredMiss,
        suggestedLostChance,
        suggestedEffective: currentDirectionHit || suggestedFilteredMiss,
        suggestedScoreHit,
        suggestedGoalHit,
        reason: suggestedFilteredMiss
          ? "建议版会把这场转为等待/过滤，避免硬追方向。"
          : suggestedLostChance
            ? "建议版过滤了原本命中的比赛，属于机会损失。"
            : "建议版处理与当前模型接近。"
      };

    const total = rows.length;
    const currentDirection = rows.filter(x => x.currentDirectionHit).length;
    const currentScore = rows.filter(x => x.currentScoreHit).length;
    const currentGoal = rows.filter(x => x.currentGoalHit).length;
    const suggestedEffective = rows.filter(x => x.suggestedEffective).length;
    const suggestedScore = rows.filter(x => x.suggestedScoreHit).length;
    const suggestedGoal = rows.filter(x => x.suggestedGoalHit).length;
    const protectedCount = rows.filter(x => x.suggestedFilteredMiss).length;
    const lostChance = rows.filter(x => x.suggestedLostChance).length;

    const summary = [
      ["方向处理", pct(currentDirection, total), pct(suggestedEffective, total), `建议版多保护 ${protectedCount} 场失手，机会损失 ${lostChance} 场`],
      ["比分覆盖", pct(currentScore, total), pct(suggestedScore, total), "建议版扩大候选比分范围"],
      ["进球区间", pct(currentGoal, total), pct(suggestedGoal, total), "建议版结合波胆热区补充进球区间"]
    ];

    let verdict = "建议版只是模拟，还不能替换当前模型。";
    if (suggestedEffective > currentDirection && lostChance <= 1) {
      verdict = "建议版在历史样本里更会保护失手场，可以继续扩大样本验证。";
    } else if (lostChance > protectedCount) {
      verdict = "建议版过滤过度，暂时不建议采用。";

      rows: rows.map(x => [

        x.action,
        x.suggestedScoreHit ? "覆盖" : "未覆盖",
        x.suggestedGoalHit ? "命中" : "未命中",
        x.reason

  }

  const api = { compareModelVersions };
  window.ModelVersionEngine = api;
  Object.assign(window, api);
})();

// 跨届汇总引擎
// 目标：把 2018、2022 等已结束赛事放在一起验证，判断模型问题是否跨届存在。
(function () {
  function historicalTournamentMatches(tournaments) {
    return tournaments
      .filter(t => t.status === "已结束")
      .map(t => ({
        tournament: t,
        matches: (window[t.dataKey] || []).map(m => ({ ...m, tournamentId: t.id, tournamentName: t.short }))
      }))
      .filter(x => x.matches.length);
  }

  function crossTournamentStats(tournaments) {
    const groups = historicalTournamentMatches(tournaments);
    const allMatches = groups.flatMap(x => x.matches);
    const aggregate = backtestStats(allMatches);
    const advice = modelAdvice(allMatches);
    const version = compareModelVersions(allMatches);
    const review = reviewTournament(allMatches);

    const tournamentRows = groups.map(group => {
      const stats = backtestStats(group.matches);
      return [
        group.tournament.short,
        `${stats.total} 场`,
        stats.directionRate,
        stats.scoreRate,
        stats.goalRate,
        stats.upsetWarnRate
      ];
    });

    const recurringRows = review.summary.slice(0, 5).map(x => [
      x.reason,
      `${x.count} 次`,
      x.matches.slice(0, 4).join(" / ")
    ]);

    const adviceRows = advice.suggestions.slice(0, 5).map(x => [
      x.reason,
      `${x.count} 次`,
      x.urgency,
      x.target
    ]);

    const overviewRows = [
      ["历史总样本", `${aggregate.total} 场`],
      ["整体方向命中", aggregate.directionRate],
      ["整体比分覆盖", aggregate.scoreRate],
      ["整体进球命中", aggregate.goalRate],
      ["冷门预警有效", aggregate.upsetWarnRate]
    ];

    let conclusion = "历史样本还在扩充中，跨届结论暂时只作为观察。";
    if (aggregate.total >= 12 && advice.suggestions.length) {
      conclusion = `跨届样本显示，“${advice.suggestions[0].reason}”是当前最需要继续验证的问题。`;
    }
    if (version.verdict.includes("继续扩大样本验证")) {
      conclusion += " 建议版模型有保护失手场的迹象，但仍不能直接替换正式模型。";
    }

    return {
      total: aggregate.total,
      conclusion,
      overviewRows,
      tournamentRows,
      recurringRows,
      adviceRows,
      versionRows: version.summary
    };
  }

  const api = { historicalTournamentMatches, crossTournamentStats };
  window.CrossTournamentEngine = api;
  Object.assign(window, api);
})();

    if (!m.probs) {
      addIssue(issues, "错误", "probs", "缺少胜平负概率");
    } else {
      ["home", "draw", "away"].forEach(field => {
        if (typeof m.probs[field] !== "number") addIssue(issues, "错误", `probs.${field}`, `缺少 ${field} 概率`);
      });
      const total = (m.probs.home || 0) + (m.probs.draw || 0) + (m.probs.away || 0);
      if (Math.abs(total - 100) > 5) addIssue(issues, "提醒", "probs", `胜平负概率合计为 ${total}，建议接近 100`);
    }

    if (!Array.isArray(m.goals) || !m.goals.length) {
      addIssue(issues, "错误", "goals", "缺少进球数概率");
    }

    if (!m.scoreOdds || !Object.keys(m.scoreOdds).length) {
      addIssue(issues, "提醒", "scoreOdds", "缺少波胆赔率，波胆热力图会不完整");
    }

    if (!Array.isArray(m.scoreProb) || !m.scoreProb.length) {
      addIssue(issues, "提醒", "scoreProb", "缺少候选比分概率");
    }

    if (!m.handicap) {
      addIssue(issues, "错误", "handicap", "缺少让球盘口数据");
    } else {
      if (!Array.isArray(m.handicap.timeline) || m.handicap.timeline.length < 2) {
        addIssue(issues, "错误", "handicap.timeline", "盘口时间线至少需要初盘和临场两条数据");
      }
      if (!hasValue(m.handicap.signal)) {
        addIssue(issues, "提醒", "handicap.signal", "缺少盘口文字信号说明");
      }
    }

    if (m.actual && !m.finalScore) {
      addIssue(issues, "提醒", "finalScore", "已结束比赛建议填写最终结果");
    }

    const errorCount = issues.filter(x => x.level === "错误").length;
    const warnCount = issues.filter(x => x.level === "提醒").length;
    return {
      match: m,
      ok: errorCount === 0,
      errorCount,
      warnCount,
      issues
    };
  }

  function validateTournament(matches) {
    const results = matches.map(validateMatch);
    const errorMatches = results.filter(x => x.errorCount > 0);
    const warnMatches = results.filter(x => x.warnCount > 0);
    const totalErrors = results.reduce((sum, x) => sum + x.errorCount, 0);
    const totalWarnings = results.reduce((sum, x) => sum + x.warnCount, 0);
    return {
      total: matches.length,
      ok: totalErrors === 0,
      totalErrors,
      totalWarnings,
      errorMatches,
      warnMatches,
      results
    };
  }

  const api = { validateMatch, validateTournament };
  window.ValidateEngine = api;
  Object.assign(window, api);
})();

  <script>

      return window.TOURNAMENTS.find(t => t.id === currentTournamentId) || window.TOURNAMENTS[0];

    function getMatches() {
      const t = getCurrentTournament();
      return (window[t.dataKey] || []).slice();
    }

    const timeLabels = ["T-24h", "T-12h", "T-6h", "T-1h", "T-10m"];
    let selectedId = null;
    let currentTab = "overview";
    let selectedScore = "2:1";

    const $ = (id) => document.getElementById(id);

    function filteredMatches() {
      const stageEl = $("stageFilter");
      const stage = stageEl ? stageEl.value : "全部";
      const list = getMatches();
      return stage === "全部" ? list : list.filter(m => m.stage === stage);
    }

    function changeTournament(id) {
      currentTournamentId = id;
      localStorage.setItem(TOURNAMENT_STORAGE_KEY, id);
      // 切赛事后回到总览页，避免详情页指向旧赛事的比赛
      $("detailScreen").classList.add("hidden");
      $("overviewScreen").classList.remove("hidden");

      renderOverview();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function bestGoal(match) {
      return [...match.goals].sort((a, b) => b[1] - a[1])[0];
    }

    function displayResult(m) {
      // 统一展示已结束比赛的结果：常规无加时只显示一个比分；
      // 有加时或点球时按《结算比分（最终结果）》格式展示。
      if (!m.actual) return "";
      if (m.finalScore && m.finalScore !== m.actual) {
        return `${m.actual}（${finalResultDetail(m)}）`;
      }
      return m.actual;
    }

    function finalResultDetail(m) {
      if (!m.finalScore || m.finalScore === m.actual) return "无加时／无点球";
      return m.finalScore
        .replace(m.actual, "")
        .replace(/[()\s（）]/g, "")
        .replace(/^，/, "");
    }

    function renderTournamentBar() {
      const cur = getCurrentTournament();
      const tList = window.TOURNAMENTS;
      const statusCls = cur.status === "已结束" ? "good" : cur.status === "进行中" ? "warn" : "blue";
      const pill = $("topbarPill");
      if (pill) {
        pill.textContent = `${cur.short} · ${cur.status}`;
        pill.className = `pill ${statusCls}`;
      }
      $("tournamentBar").innerHTML = `
        <section class="card section tournament-bar">
          <div class="tournament-row">
            <div>
              <span class="pill ${statusCls}">${cur.status}</span>
              <h2 style="margin-top:6px">${cur.name}</h2>
              <p>${cur.description}</p>
            </div>
            <div class="tournament-picker">
              <label>切换赛事</label>
              <select id="tournamentSelect">
                ${tList.map(t => `<option value="${t.id}" ${t.id === cur.id ? "selected" : ""}>${t.short} · ${t.status}</option>`).join("")}
              </select>
            </div>
          </div>
        </section>
      `;
      $("tournamentSelect").addEventListener("change", e => changeTournament(e.target.value));
    }

    function renderEmptyState() {
      const cur = getCurrentTournament();
      $("summaryGrid").innerHTML = "";
      $("priorityBoard").innerHTML = "";
      $("backtestDashboard").innerHTML = "";
      $("dataHealth").innerHTML = "";
      $("matchTotal").textContent = "0 场";
      $("matches").innerHTML = `
        <section class="card section">
          <h2>${cur.name}暂无比赛数据</h2>
          <p>${cur.status === "未开始"
            ? "这一届赛事还没有可用的盘口数据。等抽签和初盘出来后，按 matches-2022.js 的字段结构填入 " + cur.dataKey + " 即可，分析流程一行代码都不用改。"
            : "当前赛事的数据文件是空的，请检查 " + cur.dataKey + " 是否正确填充。"}</p>
          <div class="note"><p><b>提醒：</b>你可以在右上角“切换赛事”选择已有的届别，先继续完善分析方法。</p></div>
        </section>

    function renderOverview() {
      renderTournamentBar();
      renderCrossTournamentDashboard();
      const list = filteredMatches();
      if (!list.length) {
        renderEmptyState();
        return;
      }
      renderDataHealth(list);
      const scored = list.map(m => ({
        match: m,
        risk: riskControlScore(m),
        profile: handicapProfile(m),
        final: finalPrediction(m),
        intent: getLineIntent(m)
      }));
      const focus = scored.filter(x => x.risk.total >= 72).length;
      const wait = scored.filter(x => x.risk.total >= 55 && x.risk.total < 72).length;
      const filter = scored.filter(x => x.risk.total < 55).length;
      const highUpset = scored.filter(x => x.profile.upset > 60).length;

      $("summaryGrid").innerHTML = [
        ["重点跟踪", `${focus}场`],
        ["等待确认", `${wait}场`],
        ["建议过滤", `${filter}场`],

      renderPriorityBoard(scored);

        const goal = bestGoal(m);

          <article class="card match" onclick="openMatch(${m.id})">

                <div class="teams">${m.home} vs ${m.away}</div>

              <div class="decision-item"><span>进球</span><strong>${goal[0]}</strong></div>

        <section class="card section">
          <div class="row">
            <div>
              <h2>跨届汇总看板</h2>

            </div>
            <span class="pill blue">${cross.total} 场历史样本</span>
          </div>
          <div class="note"><p><b>跨届结论：</b>${cross.conclusion}</p></div>
          ${table(["指标", "结果"], cross.overviewRows)}
          <h3 style="margin-top:14px">各届表现</h3>
          ${table(["届别", "样本", "方向命中", "比分覆盖", "进球命中", "冷门预警"], cross.tournamentRows)}
          <h3 style="margin-top:14px">跨届高频问题</h3>
          ${table(["问题", "出现", "代表比赛"], cross.recurringRows)}
          <h3 style="margin-top:14px">跨届调优方向</h3>
          ${table(["问题", "出现", "紧急度", "建议方向"], cross.adviceRows)}
        </section>
      `;
    }

    function renderDataHealth(list) {
      const health = validateTournament(list);
      const cls = health.ok ? "good" : "bad";
      const title = health.ok ? "数据检查通过" : "数据需要修正";
      const text = health.ok
        ? `当前 ${health.total} 场比赛关键字段完整，可以正常分析。${health.totalWarnings ? "有 " + health.totalWarnings + " 个提醒，不影响页面打开。" : ""}`
        : `发现 ${health.totalErrors} 个错误、${health.totalWarnings} 个提醒。后期接 2026 真实数据时，先修正错误再分析。`;
      const issueRows = health.results
        .filter(x => x.issues.length)
        .slice(0, 5)
        .map(x => [
          `${x.match.home || "未知主队"} vs ${x.match.away || "未知客队"}`,
          x.issues.map(i => `${i.level}：${i.message}`).join("；")

      $("dataHealth").innerHTML = `

              <h2>数据检查</h2>
              <p>${text}</p>
            </div>
            <span class="pill ${cls}">${title}</span>
          </div>
          ${issueRows.length ? table(["比赛", "问题"], issueRows) : ""}
        </section>

    }

    function renderBacktestDashboard(list) {
      const stats = backtestStats(list);

      if (!stats.total) {

      $("backtestDashboard").innerHTML = `
        <section class="card section">
          <div class="row">

              <h2>回测仪表盘</h2>

            </div>
            <span class="pill blue">${stats.total} 场已回测</span>
          </div>
          <div class="backtest-grid">
            <div class="backtest-card"><span>方向命中率</span><strong>${stats.directionRate}</strong><p>胜平负/不败方向是否命中</p></div>
            <div class="backtest-card"><span>比分区间命中</span><strong>${stats.scoreRate}</strong><p>候选比分是否包含实际比分</p></div>
            <div class="backtest-card"><span>进球区间命中</span><strong>${stats.goalRate}</strong><p>0-1 / 2-3 / 4+ 是否命中</p></div>
            <div class="backtest-card"><span>冷门预警有效</span><strong>${stats.upsetWarnRate}</strong><p>高冷门提示是否真的发生反向结果</p></div>
          </div>
          <div class="note"><p><b>风控分验证：</b>重点跟踪命中率 ${stats.focusRate}；等待确认命中率 ${stats.waitRate}；建议过滤命中率 ${stats.filterRate}。如果重点跟踪长期不高，说明评分权重需要回炉重调。</p></div>
          <h3 style="margin-top:14px">复盘原因分布</h3>

                  <div>

    function renderPriorityBoard(scored) {
      const focus = [...scored].sort((a, b) => b.risk.total - a.risk.total).slice(0, 2);

        boardCard("冷门预警", upset, "warn", x => `冷门 ${x.profile.upset}% · ${x.intent.type}`),
        boardCard("建议过滤", filter, "bad", x => `${x.risk.total}分 · ${x.intent.type}`)
      ].join("");

    function boardCard(title, items, type, descFn) {
      return `
        <section class="card board-card">
          <h2>${title}<span class="pill ${type}">${items.length}</span></h2>

            ${items.map(x => `
              <div class="board-row" onclick="openMatch(${x.match.id})">

      `;

    function openMatch(id) {

      $("detailScreen").classList.remove("hidden");
      renderDetail();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function goBack() {
      $("detailScreen").classList.add("hidden");
      $("overviewScreen").classList.remove("hidden");
      renderOverview();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function getMatch() {
      return getMatches().find(m => m.id === selectedId);
    }

    function setTab(tab) {
      currentTab = tab;
      renderDetail();
    }

    function renderDetail() {
      const m = getMatch();
      const risk = riskControlScore(m);
      const profile = handicapProfile(m);
      const final = finalPrediction(m);
      const riskCls = risk.total >= 72 ? "good" : risk.total >= 55 ? "warn" : "bad";
      $("detailTitle").innerHTML = `
        <section class="card detail-title">
          <div class="match-head">
            <div>
              <span class="pill blue">${m.date} · ${m.stage}</span>

          <div class="decision-strip">
            <div class="decision-item"><span>风控分</span><strong>${risk.total} · ${risk.riskLevel}</strong></div>
            <div class="decision-item"><span>推荐处理</span><strong>${risk.action}</strong></div>
            <div class="decision-item"><span>主方向</span><strong>${final.direction}</strong></div>
            <div class="decision-item"><span>冷门风险</span><strong>${profile.upset}%</strong></div>
            <div class="decision-item"><span>最终比分</span><strong>${displayResult(m) || "比赛未开始"}</strong></div>
          </div>

      `;

      ["overview", "riskScore", "scoreOdds", "handicap", "collect"].forEach(t => {
        $("tab" + t[0].toUpperCase() + t.slice(1)).classList.toggle("active", currentTab === t);
      });

      if (currentTab === "riskScore") return renderRiskScore(m);
      if (currentTab === "scoreOdds") return renderScoreOdds(m);
      if (currentTab === "handicap") return renderHandicap(m);
      if (currentTab === "collect") return renderCollect(m);
      renderMatchOverview(m);
    }

    function renderMatchOverview(m) {
      const profile = handicapProfile(m);
      const hotScore = fullScoreMarket(m).sort((a, b) => a.change - b.change)[0];
      const final = finalPrediction(m);
      const plan = bettingReferencePlan(m);
      const live = liveConfirmation(m);
      const review = m.actual ? reviewMatch(m) : null;
      $("detailContent").innerHTML = `
        <section class="card final-card">
          <h2>单场结论</h2>
          <p>先给处理建议，再看细节。这里不是鼓励每场都参与，而是帮你快速判断“跟踪、等待、过滤”。</p>
          <div class="final-grid">
            <div class="final-item"><span>处理建议</span><strong>${riskControlScore(m).action}</strong></div>
            <div class="final-item"><span>候选比分</span><strong>${final.scoreZone}</strong></div>
            <div class="final-item"><span>进球数</span><strong>${final.goalZone}</strong></div>
            <div class="final-item"><span>信心分</span><strong>${final.confidence}%</strong></div>
          </div>
        </section>

          <p>这里是分析后的候选方向，不是保证结果。真正是否执行，要等临场盘口、首发和多家公司一致性确认。</p>

            </div>
          </div>
          <div class="note"><p><b>提醒：</b>如果风控结论是“等临场确认”或“建议过滤”，主方案只作为观察，不建议提前下结论。</p></div>
        </section>
        <section class="card section">

    function renderHeatmap(market) {
      const maxDrop = Math.max(...market.map(x => Math.abs(Math.min(0, x.change))));
      const maxScore = window.SCORING_CONFIG?.scoreRange?.maxCorrectScore ?? 5;
      const scoreRange = Array.from({ length: maxScore + 1 }, (_, i) => i);
      const headers = ["主\\客", ...scoreRange.map(String)];
      const headHtml = headers.map(h => `<div class="heat-cell header">${h}</div>`).join("");
      const rows = scoreRange.map(h => {
        const cells = [(`<div class="heat-cell header">${h}</div>`)];
        scoreRange.forEach(a => {
          const item = market.find(x => x.home === h && x.away === a);
          const level = maxDrop ? Math.min(1, Math.abs(Math.min(0, item.change)) / maxDrop) : 0;
          const bg = `rgba(37, 99, 235, ${0.08 + level * 0.58})`;
          const color = level > 0.55 ? "#fff" : "#111827";
          cells.push(`
            <div class="heat-cell score ${item.score === selectedScore ? "active" : ""}" onclick="selectScore('${item.score}')" style="background:${bg};color:${color}">
              <strong>${item.score}</strong>
              <span style="color:${level > 0.55 ? "rgba(255,255,255,.86)" : "#6b7280"}">赔率 ${item.last} · ${item.change.toFixed(1)}%</span>
            </div>
          `);
        });
        return cells.join("");
      }).join("");
      const others = market.filter(x => x.score.includes("其他")).map(x => `
        <div class="heat-cell score ${x.score === selectedScore ? "active" : ""}" onclick="selectScore('${x.score}')" style="grid-column: span 2">
          <strong>${x.score}</strong>
          <span>赔率 ${x.last} · ${x.change.toFixed(1)}%</span>
        </div>
      `).join("");
      return headHtml + rows + `<div class="heat-cell header">其他</div>` + others;
    }

    function table(headers, rows) {
      return `
        <table>
          <thead><tr>${headers.map(h => `<th>${h}</th>`).join("")}</tr></thead>
          <tbody>${rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join("")}</tr>`).join("")}</tbody>
        </table>
      `;
    }

    function drawLineChart(canvasId, series, yName) {
      const canvas = $(canvasId);
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      const pad = 42;
      const all = series.flatMap(s => s.values);
      const min = Math.min(...all) * .95;
      const max = Math.max(...all) * 1.05;
      const x = i => pad + i * ((w - pad * 2) / (timeLabels.length - 1));
      const y = v => h - pad - ((v - min) / (max - min)) * (h - pad * 2);

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, w, h);
      ctx.strokeStyle = "#e5e7eb";
      ctx.lineWidth = 1;
      for (let i = 0; i < 4; i++) {
        const yy = pad + i * ((h - pad * 2) / 3);
        ctx.beginPath();
        ctx.moveTo(pad, yy);
        ctx.lineTo(w - pad, yy);
        ctx.stroke();
      }

      series.forEach((s, idx) => {
        ctx.strokeStyle = s.color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        s.values.forEach((v, i) => i ? ctx.lineTo(x(i), y(v)) : ctx.moveTo(x(i), y(v)));
        ctx.stroke();
        s.values.forEach((v, i) => {
          ctx.fillStyle = s.color;
          ctx.beginPath();
          ctx.arc(x(i), y(v), 4, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.fillStyle = s.color;
        ctx.font = "13px sans-serif";
        ctx.fillText(s.label, pad + idx * 110, 24);
      });

      ctx.fillStyle = "#6b7280";
      ctx.font = "12px sans-serif";
      timeLabels.forEach((label, i) => ctx.fillText(label, x(i) - 18, h - 14));
      ctx.fillText(yName, 10, 18);
    }

    $("stageFilter").addEventListener("change", renderOverview);
    renderOverview();
  </script>
</body>
</html>
