<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>世界杯赔率风控分析</title>
  <style>
    :root {
      --bg: #f6f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --line: #e5e7eb;
      --blue: #2563eb;
      --green: #059669;
      --red: #dc2626;
      --orange: #ea580c;
      --soft-blue: #eff6ff;
      --soft-green: #ecfdf5;
      --soft-red: #fef2f2;
      --soft-orange: #fff7ed;
      --shadow: 0 12px 36px rgba(15, 23, 42, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    .app {
      width: min(1080px, calc(100% - 28px));
      margin: 0 auto;
      padding: 18px 0 48px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
    }

    h1, h2, h3, p { margin: 0; }
    h1 { font-size: 24px; letter-spacing: -.4px; }
    h2 { font-size: 19px; }
    h3 { font-size: 15px; }
    p { color: var(--muted); line-height: 1.55; font-size: 13px; }

    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 10px;
      color: var(--muted);
      background: #fff;
      font-size: 12px;
      white-space: nowrap;
    }

    .pill.good { color: var(--green); background: var(--soft-green); border-color: #bbf7d0; }
    .pill.bad { color: var(--red); background: var(--soft-red); border-color: #fecaca; }
    .pill.warn { color: var(--orange); background: var(--soft-orange); border-color: #fed7aa; }
    .pill.blue { color: var(--blue); background: var(--soft-blue); border-color: #bfdbfe; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      box-shadow: var(--shadow);
    }

    .section {
      padding: 16px;
      margin-bottom: 12px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .summary {
      padding: 13px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
    }

    .summary span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .summary strong {
      font-size: 22px;
    }

    .board {
      display: grid;
      grid-template-columns: 1.25fr .9fr .9fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    .board-card {
      padding: 14px;
      min-height: 128px;
    }

    .board-card h2 {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .board-list {
      display: grid;
      gap: 8px;
    }

    .board-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 9px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f9fafb;
      cursor: pointer;
    }

    .board-row strong {
      font-size: 13px;
    }

    .board-row span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-top: 2px;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    select, button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      border-radius: 12px;
      padding: 10px 12px;
      font: inherit;
      cursor: pointer;
    }

    button.primary {
      background: var(--blue);
      color: #fff;
      border-color: var(--blue);
    }

    button.ghost {
      background: #fff;
    }

    .matches {
      display: grid;
      gap: 10px;
    }

    .match {
      padding: 12px 14px;
      cursor: pointer;
    }

    .match-line {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
    }

    .match-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .decision-strip {
      display: grid;
      grid-template-columns: 1.2fr repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .decision-item {
      padding: 10px;
      border-radius: 12px;
      background: #f9fafb;
      border: 1px solid var(--line);
    }

    .decision-item span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
    }

    .decision-item strong {
      font-size: 14px;
    }

    .title-score {
      display: inline-flex;
      align-items: center;
      margin-left: 8px;
      padding: 4px 9px;
      border-radius: 10px;
      background: var(--soft-blue);
      color: var(--blue);
      font-size: 16px;
      vertical-align: middle;
    }

    .ticket-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 12px;
    }

    .ticket {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: #f9fafb;
    }

    .ticket.recommended {
      border-color: #bfdbfe;
      background: var(--soft-blue);
    }

    .ticket h3 {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      align-items: center;
      margin-bottom: 10px;
    }

    .ticket-line {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 7px 0;
      border-bottom: 1px solid rgba(229,231,235,.8);
      font-size: 13px;
    }

    .ticket-line:last-child {
      border-bottom: 0;
    }

    .ticket-line span {
      color: var(--muted);
    }

    .match-head, .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .teams {
      font-size: 17px;
      font-weight: 800;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .mini {
      padding: 10px;
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: 12px;
    }

    .mini span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      margin-bottom: 4px;
    }

    .mini strong {
      font-size: 14px;
    }

    .final-card {
      padding: 16px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #111827, #1f2937);
      color: #fff;
      border: 0;
    }

    .final-card p {
      color: rgba(255,255,255,.72);
    }

    .final-grid {
      display: grid;
      grid-template-columns: 1.2fr repeat(3, 1fr);
      gap: 10px;
      margin-top: 14px;
    }

    .final-item {
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.09);
      border: 1px solid rgba(255,255,255,.12);
    }

    .final-item span {
      color: rgba(255,255,255,.65);
      font-size: 12px;
    }

    .final-item strong {
      display: block;
      font-size: 20px;
      margin-top: 6px;
    }

    .score-ring {
      width: 92px;
      height: 92px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--blue) calc(var(--score) * 1%), #e5e7eb 0);
      margin: 12px auto 8px;
    }

    .score-ring b {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: #fff;
      display: grid;
      place-items: center;
      font-size: 22px;
    }

    .reason-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .reason {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f9fafb;
      font-size: 13px;
    }

    .reason span {
      color: var(--muted);
    }

    .screen.hidden { display: none; }

    .detail-title {
      padding: 16px;
      margin-bottom: 12px;
    }

    .detail-title h2 {
      font-size: 24px;
      margin: 8px 0;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 12px;
      position: sticky;
      top: 0;
      padding: 8px 0;
      background: rgba(246,247,251,.92);
      backdrop-filter: blur(10px);
      z-index: 10;
    }

    .tabs button.active {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }

    .prob-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .prob {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #f9fafb;
    }

    .prob span {
      color: var(--muted);
      font-size: 12px;
    }

    .prob strong {
      display: block;
      font-size: 24px;
      margin-top: 4px;
    }

    .bar {
      height: 7px;
      background: #e5e7eb;
      border-radius: 99px;
      overflow: hidden;
      margin-top: 9px;
    }

    .bar i {
      display: block;
      height: 100%;
      background: var(--blue);
      border-radius: 99px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 10px;
    }

    th, td {
      padding: 10px 8px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: middle;
    }

    th {
      color: var(--muted);
      font-weight: 600;
      font-size: 12px;
    }

    .chart {
      width: 100%;
      height: 260px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      margin-top: 12px;
    }

    .score-selector {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 2px;
      margin-top: 12px;
    }

    .score-selector button {
      white-space: nowrap;
      padding: 8px 10px;
    }

    .score-selector button.active {
      color: #fff;
      background: var(--blue);
      border-color: var(--blue);
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .score-cell {
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #f9fafb;
    }

    .score-cell strong {
      display: block;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .score-cell span {
      color: var(--muted);
      font-size: 12px;
    }

    .heatmap-wrap {
      overflow-x: auto;
      margin-top: 12px;
      padding-bottom: 4px;
    }

    .heatmap {
      min-width: 720px;
      display: grid;
      grid-template-columns: 64px repeat(6, 1fr);
      gap: 6px;
    }

    .heat-cell {
      min-height: 58px;
      border-radius: 12px;
      border: 1px solid var(--line);
      padding: 8px;
      background: #f9fafb;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .heat-cell.header {
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      align-items: center;
      text-align: center;
      min-height: 38px;
    }

    .heat-cell.score {
      cursor: pointer;
    }

    .heat-cell.score.active {
      outline: 2px solid var(--blue);
      outline-offset: 1px;
    }

    .heat-cell strong {
      font-size: 14px;
    }

    .heat-cell span {
      color: #374151;
      font-size: 11px;
      margin-top: 4px;
    }

    .market-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 12px;
    }

    .market-card {
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #f9fafb;
    }

    .market-card span {
      color: var(--muted);
      font-size: 12px;
    }

    .market-card strong {
      display: block;
      font-size: 20px;
      margin-top: 6px;
    }

    .note {
      padding: 12px;
      background: #f9fafb;
      border: 1px solid var(--line);
      border-radius: 14px;
      margin-top: 12px;
    }

    .note b { color: var(--text); }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .tournament-bar { padding: 14px 16px; }

    .tournament-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: center;
    }

    .tournament-row h2 { font-size: 18px; }

    .tournament-picker {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 180px;
    }

    .tournament-picker label {
      color: var(--muted);
      font-size: 11px;
    }

    .tournament-picker select {
      padding: 9px 10px;
      font-size: 13px;
    }

    .backtest-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-top: 12px;
    }

    .backtest-card {
      padding: 13px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #f9fafb;
    }

    .backtest-card span {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }

    .backtest-card strong {
      display: block;
      font-size: 22px;
    }

    .backtest-card p {
      margin-top: 5px;
      font-size: 12px;
    }

    .case-list {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .case-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      cursor: pointer;
    }

    .case-row strong {
      font-size: 13px;
    }

    @media (max-width: 760px) {
      .app { width: min(100% - 20px, 1080px); padding-top: 12px; }
      .topbar { align-items: flex-start; }
      h1 { font-size: 21px; }
      .summary-grid { grid-template-columns: repeat(2, 1fr); }
      .board { grid-template-columns: 1fr; }
      .summary strong { font-size: 20px; }
      .toolbar { display: grid; grid-template-columns: 1fr; }
      .tournament-row { grid-template-columns: 1fr; }
      .tournament-picker { min-width: 0; }
      .backtest-grid { grid-template-columns: repeat(2, 1fr); }
      .mini-grid { grid-template-columns: repeat(2, 1fr); }
      .final-grid { grid-template-columns: 1fr 1fr; }
      .decision-strip { grid-template-columns: 1fr 1fr; }
      .ticket-grid { grid-template-columns: 1fr; }
      .tabs { grid-template-columns: repeat(5, minmax(70px, 1fr)); overflow-x: auto; }
      .tabs button { padding: 9px 8px; font-size: 12px; white-space: nowrap; }
      .prob-grid, .two-col { grid-template-columns: 1fr; }
      .score-grid { grid-template-columns: repeat(2, 1fr); }
      .market-grid { grid-template-columns: repeat(2, 1fr); }
      .match-head { align-items: flex-start; }
      .chart { height: 230px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section id="overviewScreen" class="screen">
      <div class="topbar">
        <div>
          <h1>赛事总览</h1>
          <p>先选届别，再看比赛列表，点进每场比赛看赔率、波胆和让球水位。</p>
        </div>
        <span class="pill blue" id="topbarPill">回测原型</span>
      </div>

      <div id="tournamentBar"></div>
      <div id="crossTournamentDashboard"></div>
      <div id="dataHealth"></div>

      <div class="summary-grid" id="summaryGrid"></div>

      <div class="board" id="priorityBoard"></div>

      <div id="backtestDashboard"></div>

      <div class="toolbar">
        <select id="stageFilter">
          <option value="全部">全部阶段</option>
          <option value="小组赛">小组赛</option>
          <option value="淘汰赛">淘汰赛</option>
          <option value="决赛">决赛</option>
        </select>
      </div>

      <div class="topbar">
        <div>
          <h2>全部比赛</h2>
          <p>列表保持紧凑，详细分析点进去看。</p>
        </div>
        <span class="pill" id="matchTotal"></span>
      </div>
      <div class="matches" id="matches"></div>
    </section>

    <section id="detailScreen" class="screen hidden">
      <div class="topbar">
        <button class="ghost" onclick="goBack()">← 返回赛事总览</button>
        <span class="pill warn">模拟采集数据</span>
      </div>
      <div id="detailTitle"></div>
      <div class="tabs">
        <button id="tabOverview" onclick="setTab('overview')">概览</button>
        <button id="tabRiskScore" onclick="setTab('riskScore')">评分</button>
        <button id="tabScoreOdds" onclick="setTab('scoreOdds')">波胆</button>
        <button id="tabHandicap" onclick="setTab('handicap')">让球</button>
        <button id="tabCollect" onclick="setTab('collect')">采集</button>
      </div>
      <div id="detailContent"></div>
    </section>
  </main>

  <!-- Data: 赛事注册表 -->
  <script src="data/tournaments.js"></script>
  <!-- Data: 历史样本 -->
  <script src="data/matches-2018.js"></script>
  <script src="data/matches-2022.js"></script>
  <script src="data/matches-2026.js"></script>
  <!-- Engine: 配置 -->
  <script src="engine/config.js"></script>
  <!-- Engine: 评分引擎（依赖 config） -->
  <script src="engine/scoring.js"></script>
  <!-- Engine: 回测引擎（依赖 scoring 引擎） -->
  <script src="engine/backtest.js"></script>
  <!-- Engine: 盘口意图（依赖 scoring） -->
  <script src="engine/intent.js"></script>
  <!-- Engine: 赛后复盘（依赖 scoring + intent） -->
  <script src="engine/review.js"></script>
  <!-- Engine: 模型建议（依赖 review + backtest） -->
  <script src="engine/model-advice.js"></script>
  <!-- Engine: 模型版本对比（依赖 scoring + intent + backtest） -->
  <script src="engine/model-version.js"></script>
  <!-- Engine: 跨届汇总（依赖 backtest + model-advice + model-version + review） -->
  <script src="engine/cross-tournament.js"></script>
  <!-- Engine: 数据校验 -->
  <script src="engine/validate.js"></script>

  <!-- Page Logic -->
  <script>
    // 当前选中的赛事（届别）。以下所有逻辑都从这里读取数据，
    // 切换届别只改这一处状态，其他评分/UI 逻辑完全不动。
    const TOURNAMENT_STORAGE_KEY = "selected_tournament_id";
    let currentTournamentId = localStorage.getItem(TOURNAMENT_STORAGE_KEY)
      || window.DEFAULT_TOURNAMENT_ID
      || (window.TOURNAMENTS[0] && window.TOURNAMENTS[0].id);

    function getCurrentTournament() {
      return window.TOURNAMENTS.find(t => t.id === currentTournamentId) || window.TOURNAMENTS[0];
    }

    function getMatches() {
      const t = getCurrentTournament();
      return (window[t.dataKey] || []).slice();
    }

    const timeLabels = ["T-24h", "T-12h", "T-6h", "T-1h", "T-10m"];
    let selectedId = null;
    let currentTab = "overview";
    let selectedScore = "2:1";

    const $ = (id) => document.getElementById(id);

    function filteredMatches() {
      const stageEl = $("stageFilter");
      const stage = stageEl ? stageEl.value : "全部";
      const list = getMatches();
      return stage === "全部" ? list : list.filter(m => m.stage === stage);
    }

    function changeTournament(id) {
      currentTournamentId = id;
      localStorage.setItem(TOURNAMENT_STORAGE_KEY, id);
      // 切赛事后回到总览页，避免详情页指向旧赛事的比赛
      $("detailScreen").classList.add("hidden");
      $("overviewScreen").classList.remove("hidden");
      selectedId = null;
      renderOverview();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function bestGoal(match) {
      return [...match.goals].sort((a, b) => b[1] - a[1])[0];
    }

    function displayResult(m) {
      // 统一展示已结束比赛的结果：常规无加时只显示一个比分；
      // 有加时或点球时按《结算比分（最终结果）》格式展示。
      if (!m.actual) return "";
      if (m.finalScore && m.finalScore !== m.actual) {
        return `${m.actual}（${finalResultDetail(m)}）`;
      }
      return m.actual;
    }

    function finalResultDetail(m) {
      if (!m.finalScore || m.finalScore === m.actual) return "无加时／无点球";
      return m.finalScore
        .replace(m.actual, "")
        .replace(/[()\s（）]/g, "")
        .replace(/^，/, "");
    }

    function renderTournamentBar() {
      const cur = getCurrentTournament();
      const tList = window.TOURNAMENTS;
      const statusCls = cur.status === "已结束" ? "good" : cur.status === "进行中" ? "warn" : "blue";
      const pill = $("topbarPill");
      if (pill) {
        pill.textContent = `${cur.short} · ${cur.status}`;
        pill.className = `pill ${statusCls}`;
      }
      $("tournamentBar").innerHTML = `
        <section class="card section tournament-bar">

    function renderEmptyState() {
      const cur = getCurrentTournament();
      $("summaryGrid").innerHTML = "";
      $("priorityBoard").innerHTML = "";
      $("backtestDashboard").innerHTML = "";
      $("dataHealth").innerHTML = "";
      $("matchTotal").textContent = "0 场";

        <section class="card section">
          <h2>${cur.name}暂无比赛数据</h2>
          <p>${cur.status === "未开始"
            ? "这一届赛事还没有可用的盘口数据。等抽签和初盘出来后，按 matches-2022.js 的字段结构填入 " + cur.dataKey + " 即可，分析流程一行代码都不用改。"

        </section>
      `;

    function renderOverview() {
      renderTournamentBar();
      renderCrossTournamentDashboard();
      const list = filteredMatches();
      if (!list.length) {
        renderEmptyState();
        return;
      }
      renderDataHealth(list);
      const scored = list.map(m => ({
        match: m,
        risk: riskControlScore(m),
        profile: handicapProfile(m),
        final: finalPrediction(m),
        intent: getLineIntent(m)
      }));
      const focus = scored.filter(x => x.risk.total >= 72).length;
      const wait = scored.filter(x => x.risk.total >= 55 && x.risk.total < 72).length;
      const filter = scored.filter(x => x.risk.total < 55).length;
      const highUpset = scored.filter(x => x.profile.upset > 60).length;

      $("summaryGrid").innerHTML = [
        ["重点跟踪", `${focus}场`],
        ["等待确认", `${wait}场`],
        ["建议过滤", `${filter}场`],
        ["高冷门", `${highUpset}场`]
      ].map(([k, v]) => `<div class="summary"><span>${k}</span><strong>${v}</strong></div>`).join("");

      renderPriorityBoard(scored);
      renderBacktestDashboard(list);
      $("matchTotal").textContent = `${list.length} 场`;

      $("matches").innerHTML = scored.map(({ match: m, risk, profile, final, intent }) => {
        const goal = bestGoal(m);
        return `
          <article class="card match" onclick="openMatch(${m.id})">
            <div class="match-line">
              <div>
                <div class="teams">${m.home} vs ${m.away}</div>
                <div class="match-meta">
                  <span class="pill">${m.date}</span>
                  <span class="pill">${m.stage}</span>
                  <span class="pill ${risk.total >= 72 ? "good" : risk.total >= 55 ? "warn" : "bad"}">${risk.action}</span>

              <span class="pill ${profile.upset > 60 ? "warn" : "blue"}">冷门 ${profile.upset}%</span>
            </div>
            <div class="decision-strip">
              <div class="decision-item"><span>风控分</span><strong>${risk.total} · ${risk.riskLevel}</strong></div>
              <div class="decision-item"><span>方向</span><strong>${final.direction}</strong></div>
              <div class="decision-item"><span>盘口意图</span><strong>${intent.type}</strong></div>
              <div class="decision-item"><span>比分</span><strong>${final.scoreZone.split(" / ")[0]}</strong></div>
              <div class="decision-item"><span>进球</span><strong>${goal[0]}</strong></div>
              <div class="decision-item"><span>最终比分</span><strong>${displayResult(m) || "未结束"}</strong></div>
            </div>
          </article>

        return;

      $("crossTournamentDashboard").innerHTML = `
        <section class="card section">

      const health = validateTournament(list);

        : `发现 ${health.totalErrors} 个错误、${health.totalWarnings} 个提醒。后期接 2026 真实数据时，先修正错误再分析。`;
      const issueRows = health.results
        .filter(x => x.issues.length)
        .slice(0, 5)
        .map(x => [
          `${x.match.home || "未知主队"} vs ${x.match.away || "未知客队"}`,

          <div class="row">
            <div>
              <h2>数据检查</h2>
              <p>${text}</p>

            <span class="pill ${cls}">${title}</span>

              ${stats.missRows.slice(0, 4).map(x => `
                <div class="case-row" onclick="openMatch(${x.match.id})">
                  <div>
                    <strong>${x.match.home} vs ${x.match.away}</strong>
                    <p>实际 ${displayResult(x.match)}；系统方向 ${x.final.direction}；冷门预警 ${x.warnedUpset ? "有" : "无"}</p>

      `;

    function renderPriorityBoard(scored) {
      const focus = [...scored].sort((a, b) => b.risk.total - a.risk.total).slice(0, 2);
      const upset = [...scored].sort((a, b) => b.profile.upset - a.profile.upset).slice(0, 2);
      const filter = [...scored].sort((a, b) => a.risk.total - b.risk.total).slice(0, 2);
      $("priorityBoard").innerHTML = [
        boardCard("重点跟踪", focus, "good", x => `${x.risk.total}分 · ${x.intent.type} · ${x.final.direction}`),
        boardCard("冷门预警", upset, "warn", x => `冷门 ${x.profile.upset}% · ${x.intent.type}`),
        boardCard("建议过滤", filter, "bad", x => `${x.risk.total}分 · ${x.intent.type}`)
      ].join("");
    }

    function boardCard(title, items, type, descFn) {
      return `
        <section class="card board-card">
          <h2>${title}<span class="pill ${type}">${items.length}</span></h2>
          <div class="board-list">
            ${items.map(x => `
              <div class="board-row" onclick="openMatch(${x.match.id})">
                <div><strong>${x.match.home} vs ${x.match.away}</strong><span>${descFn(x)}</span></div>
                <span class="pill">${x.match.stage}</span>
              </div>
            `).join("")}
          </div>
        </section>
      `;
    }

    function openMatch(id) {
      selectedId = id;
      const match = getMatch();
      selectedScore = match.scoreProb[0][0];
      currentTab = "overview";
      $("overviewScreen").classList.add("hidden");
      $("detailScreen").classList.remove("hidden");
      renderDetail();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

    function goBack() {
      $("detailScreen").classList.add("hidden");
      $("overviewScreen").classList.remove("hidden");
      renderOverview();
      window.scrollTo({ top: 0, behavior: "smooth" });
    }

      return getMatches().find(m => m.id === selectedId);

      currentTab = tab;
      renderDetail();
    }

      $("detailTitle").innerHTML = `
        <section class="card detail-title">
          <div class="match-head">

      const selected = market.find(x => x.score === selectedScore);
      const hotScores = [...market].sort((a, b) => a.change - b.change).slice(0, 6);
      const maxScore = window.SCORING_CONFIG?.scoreRange?.maxCorrectScore ?? 5;
      const heatmapColumns = `64px repeat(${maxScore + 1}, 1fr)`;

        <section class="card section">
          <h2>波胆赔率波动</h2>

            <div class="heatmap" style="grid-template-columns:${heatmapColumns};">
              ${renderHeatmap(market)}
            </div>
          </div>

    function renderHeatmap(market) {
      const maxDrop = Math.max(...market.map(x => Math.abs(Math.min(0, x.change))));
      const maxScore = window.SCORING_CONFIG?.scoreRange?.maxCorrectScore ?? 5;
      const scoreRange = Array.from({ length: maxScore + 1 }, (_, i) => i);
      const headers = ["主\\客", ...scoreRange.map(String)];
      const headHtml = headers.map(h => `<div class="heat-cell header">${h}</div>`).join("");
      const rows = scoreRange.map(h => {
        const cells = [(`<div class="heat-cell header">${h}</div>`)];
        scoreRange.forEach(a => {
          const item = market.find(x => x.home === h && x.away === a);
          const level = maxDrop ? Math.min(1, Math.abs(Math.min(0, item.change)) / maxDrop) : 0;
          const bg = `rgba(37, 99, 235, ${0.08 + level * 0.58})`;
          const color = level > 0.55 ? "#fff" : "#111827";
          cells.push(`
            <div class="heat-cell score ${item.score === selectedScore ? "active" : ""}" onclick="selectScore('${item.score}')" style="background:${bg};color:${color}">
              <strong>${item.score}</strong>
              <span style="color:${level > 0.55 ? "rgba(255,255,255,.86)" : "#6b7280"}">赔率 ${item.last} · ${item.change.toFixed(1)}%</span>
            </div>
          `);
        });
        return cells.join("");
      }).join("");
      const others = market.filter(x => x.score.includes("其他")).map(x => `
        <div class="heat-cell score ${x.score === selectedScore ? "active" : ""}" onclick="selectScore('${x.score}')" style="grid-column: span 2">
          <strong>${x.score}</strong>
          <span>赔率 ${x.last} · ${x.change.toFixed(1)}%</span>
        </div>
      `).join("");
      return headHtml + rows + `<div class="heat-cell header">其他</div>` + others;
    }

    function table(headers, rows) {
      return `
        <table>
          <thead><tr>${headers.map(h => `<th>${h}</th>`).join("")}</tr></thead>
          <tbody>${rows.map(r => `<tr>${r.map(c => `<td>${c}</td>`).join("")}</tr>`).join("")}</tbody>
        </table>
      `;
    }

    function drawLineChart(canvasId, series, yName) {
      const canvas = $(canvasId);
      const ctx = canvas.getContext("2d");
      const w = canvas.width;
      const h = canvas.height;
      const pad = 42;
      const all = series.flatMap(s => s.values);
      const min = Math.min(...all) * .95;
      const max = Math.max(...all) * 1.05;
      const x = i => pad + i * ((w - pad * 2) / (timeLabels.length - 1));
      const y = v => h - pad - ((v - min) / (max - min)) * (h - pad * 2);

      ctx.clearRect(0, 0, w, h);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, w, h);
      ctx.strokeStyle = "#e5e7eb";
      ctx.lineWidth = 1;
      for (let i = 0; i < 4; i++) {
        const yy = pad + i * ((h - pad * 2) / 3);
        ctx.beginPath();
        ctx.moveTo(pad, yy);
        ctx.lineTo(w - pad, yy);
        ctx.stroke();
      }

      series.forEach((s, idx) => {
        ctx.strokeStyle = s.color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        s.values.forEach((v, i) => i ? ctx.lineTo(x(i), y(v)) : ctx.moveTo(x(i), y(v)));
        ctx.stroke();
        s.values.forEach((v, i) => {
          ctx.fillStyle = s.color;
          ctx.beginPath();
          ctx.arc(x(i), y(v), 4, 0, Math.PI * 2);
          ctx.fill();
        });
        ctx.fillStyle = s.color;
        ctx.font = "13px sans-serif";
        ctx.fillText(s.label, pad + idx * 110, 24);
      });

      ctx.fillStyle = "#6b7280";
      ctx.font = "12px sans-serif";
      timeLabels.forEach((label, i) => ctx.fillText(label, x(i) - 18, h - 14));
      ctx.fillText(yName, 10, 18);
    }

    $("stageFilter").addEventListener("change", renderOverview);
    renderOverview();
