name: Update 2026 数据更新（手动触发）

on:
  # 只支持手动触发（workflow_dispatch），
  # 不做定时自动触发，避免 mock 数据频繁无意义提交
  # 确认接入真实数据源后再考虑启用 schedule

  # 支持手动触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 生成 2026 数据
        env:
          WORLDCUP_THE_ODDS_API_KEY: ${{ secrets.WORLDCUP_THE_ODDS_API_KEY }}
          WORLDCUP_API_FOOTBALL_KEY: ${{ secrets.WORLDCUP_API_FOOTBALL_KEY }}
          WORLDCUP_SPORTMONKS_KEY: ${{ secrets.WORLDCUP_SPORTMONKS_KEY }}
        run: |
          node scripts/fetch-2026-data.js
          node scripts/normalize-2026-data.js

      - name: 校验生成结果
        run: |
          echo "=== matches-2026.json ==="
          node -e "const d=require('./data/matches-2026.json'); console.log('场数:', d.length)"
          echo ""
          echo "=== source-status.json ==="
          node -e "const d=require('./data/source-status.json'); console.log('mode:', d.mode); console.log('generatedAt:', d.generatedAt)"

      - name: 有意义变化才提交
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/matches-2026.json data/source-status.json
          if git diff --staged --quiet; then
            echo "数据无变化，跳过 commit"
          else
            git commit -m "自动更新: 2026 数据 (${GITHUB_SHA:0:7})"
            git push
          fi
