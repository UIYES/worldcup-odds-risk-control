name: Update 2026 世界杯数据自动更新

on:
  # 定时：每 6 小时（等用户确认数据源后可调整）
  schedule:
    - cron: '0 */6 * * *'

  # 支持手动触发
  workflow_dispatch:

  # 修改脚本或数据文件时不自动触发（push 已在代码变动不会自动跑）

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 配置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 生成 mock/fallback 数据
        env:
          WORLDCUP_THE_ODDS_API_KEY: ${{ secrets.WORLDCUP_THE_ODDS_API_KEY }}
          WORLDCUP_API_FOOTBALL_KEY: ${{ secrets.WORLDCUP_API_FOOTBALL_KEY }}
          WORLDCUP_SPORTMONKS_KEY: ${{ secrets.WORLDCUP_SPORTMONKS_KEY }}
        run: |
          node scripts/fetch-2026-data.js
          node scripts/normalize-2026-data.js

      - name: 校验生成结果
        run: |
          echo "=== matches-2026.json ==="
          node -e "const d=require('./data/matches-2026.json'); console.log('场数:', d.length); console.log('首条 home/dummy home away:', d[0] && d[0].home, '|', d[0] && d[0].away)"
          echo ""
          echo "=== source-status.json ==="
          node -e "const d=require('./data/source-status.json'); console.log('mode:', d.mode); console.log('generatedAt:', d.generatedAt)"

      - name: Commit 提交
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/matches-2026.json data/source-status.json
          if git diff --staged --quiet; then
            echo "数据无变化，跳过 commit"
          else
            git commit -m "自动更新: 2026 数据 (${GITHUB_SHA:0:7})
            git push
          fi
